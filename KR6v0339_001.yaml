body:
  text: 現量品先説現量品其中先立自宗次破異執初又分二先總説二量次別説現量初又分二一正説二釋難今一正説現與比是量二相是所量為顯自量具功德故及為破他妄計量故了解所量依能量故此中多諸邪執故當説量量唯二種謂現比二量聖教量與譬喻量等皆假名量非真實量何故量唯二種耶曰由所量唯有二相謂自相與共相緣自相之有境心即現量現量以自相為所現境故緣共相之有境心即比量比量以共相為所現境故除自相共相外更無餘相為所量故二釋難於彼結合故餘量則非有亦非數數知無窮如念等如緣色等謂是無常或數數緣此是何等曰雖有此執仍是緣彼所量故非餘量緣自相者即屬現量以正理推知色無常者即屬比量若由意識結合未得定解者即屬非量俱非現比又數數了知亦非餘量雖於一義可數了知若皆是量則成無窮如無新知則不是量如以後憶念貪欲瞋恨等於先所知義皆非是量二別説現量有三一説真現量二説似現量三説量果初中有二説現量相説現量差別今説現量相現量離分別名種等合者此總説若識離諸分別是為現量現量雖皆是離分別但有無分別心非現量者如由膜翳見二月之眼識是無分別之似現量所離分別為指何等曰謂離名種等結合之分別如隨欲之聲安運名稱如天授祠授等詮説於義諸種類聲如説牛羊等詮説種類義諸功德聲如説青白等詮功德義諸作用聲如説供施等詮作用義諸實物聲如説有杖有角等詮有實義總之緣此等聲所起之心皆屬分別皆非現量要離彼等分別乃是現量此中并不説從何境生也説現量差別分二甲説根現量乙説餘現量今甲説根現量是不共因故彼名由根説由多義生故自義總行境多性之有法非根所了解自了非名顯自體乃根境或問五識既從根境二緣生何故依根立名名眼識等而不依境立名曰色識等耶曰根是不共因故彼識之名由根稱説非隨色等境説以色等境是與他身之識及意識所共因故如一色境他人眼識亦能見自身意識亦能緣故世間亦見由不共因設立名言如云鼓聲麥芽等以是現量是離分別對法亦云由成就眼識了知是青非想是青於義想是義非於義想是法或問若一向無分別如何五識唯緣集聚如何説云是緣處自相各是自相有境非緣物自相曰彼識是由多物所生故由多極微合為所緣然説是緣自處總為行境非於異法作不異解如眼識是緣色處為境非緣一一極微為境説此義曰多性之有法非根所了解自了非名顯自體乃根境即説多種極微體性之有法或色香味觸多塵之法非是根識所了解之境界各根識所了解之境相亦非名言所能顯示宣説根識之境即諸處離言説分別之自相體性餘義如釋量論廣辨乙説餘現量意亦義貪等自證無分別瑜伽師所教無雜見唯義分別亦自證非於義別故意亦義是説意識現量謂第六意識亦緣色等義境以領受行相而轉亦唯無分別故是現量陳那菩薩對意現量所説甚略法稱論師説意現量唯是根識最後念續起緣色等境之一念意識乃是現量以後再續起則不能親緣色等是有分別便非現量又亦不許同緣一境作一行相之二心俱生故亦無有與五識同時俱轉之五俱意識若緣異境作異行相則許容有二心俱轉不為過失如釋量論廣辨貪等自證無分別是説自證現量謂貪瞋癡苦樂等心不得根故非根現量是自證現量如是瑜伽師所教無雜見唯義是説瑜伽現量謂諸修瑜伽者不雜師長言教分別見唯義理亦是現量分別亦自證非於義別故順釋疑難或問若貪等心之自證分是現量者則分別心亦應是現量曰實爾分別心亦是自證現量然非於義是現量以於義是分別故對於義是分別不妨對自體是自證現量自證現量亦不妨對境義是分別也二説似現量迷亂世俗智比與比所生憶念及希求似現有膜翳此説七種似現量前六種是有分別第七種是無分別迷亂心如見陽焰誤為水等之有分別迷亂心世俗心如見瓶衣等物認為有瓶衣等實體之心瓶衣等唯是由分別心所假立是世間約定俗成之聲義其實體自相并無所謂瓶衣等名故此等心就世俗説是不錯誤是正確智但約實體觀則屬虛妄是分別心是似現量比量與比量後所起心皆分別先所領受義皆屬分別憶念緣過去事希求想未來境皆無實義純屬分別皆似現量有翳膜等所根識見空華毛輪二月等雖無分別然非有體故亦成似現量由根識不分別執著故仍是無分別也説此七種之理由如釋量論中廣辨似現量三字通貫上下三説量果有作用證故即果能量度亦設立為量亦非無作用又自證為果由彼體義定境相即此量由彼能量度曰若時彼現相所量量與果能取能了故彼三非各異知境知彼別故即覺二相亦由後時念成二相自證不受無此故若由餘識受無窮彼亦念如是於餘境不轉見彼故此中所説量果非如外道所計離能量外別有量果是即能量心而為量果如以斧砍木木斷為果非離木外有別斷果以識緣境了境即果解釋量果共作三説初説境為所量能量度境之心為能量心了證境之作用即為量果即量果之心帶境相而生具了證境之作用即許為能量亦非無作用喻如果隨因生説持因形如兒貌似父亦非無作用句有本作亦非無差別則作能量與量果亦非全無差別而解也第二説以自證為量果心之相分為所量見分為能量境不離心即由心自體決定境義若時心具義境爾時隨順彼心之自證即能了知樂不樂義若時唯以外義為所量爾時現境相心即為能量爾時彼心雖是自證然以此自體義之現相説為能量此説若以外境為所量時其能現境相之心體雖是自證量果然約能量度亦是能量由彼能量度句釋中作由彼義量度此説由黑白等種種義相於心中現即帶境相量度境義如是此現相既可説是所量亦可説是能量其自證分從二相生謂自相與境相境相為所量自相為能量自證為量果第三説以行相為所量能取相為能量能了知為量果此三一體非有別異約義不同安立為三或問如何知識有二相曰由有了知境與了彼能知心由此差別知覺有二相境謂色等及由何了彼之識此即義相與自相了知境者即隨順境相之識是現義相了知自識即現自相若不爾者不許識自知即不許自證分説即色等自知或成為自體者則與知境全無差別若謂由後時生識知者則過去久遠之境應不現起彼非境故是故識有二相理善成立又由後時能生憶念亦即證成識有二相如於曾受之境後時能憶如是心亦後時能憶則知先亦曾受若未曾受則不能憶故亦證成識有二相由後時生念亦即證成心有自證若無自證曾自領受則必不生後時念故如憶色等之念若謂如色等由他識領受如是心識亦由餘識領受者曰此不應理若由餘識領受者則成無窮言無窮者謂餘識後應由餘識領受則成無窮若由同時餘識或後時餘識領受皆成無窮餘識復應不緣餘境如釋量論廣説彼亦念謂若由餘識領受彼識者於彼亦須見後時憶念故然不憶餘識故知不然若彼復由餘識領受則成無窮如是若由餘識領受則彼餘識應不轉緣餘境以唯緣此前識故是故決定應許有自證識亦即成立安住果性當知現量是離分別次破異執分五一破論軌所説現量二破正理派所説三破勝論所説四破數論所説五破觀行派所説今初細科從略論軌非師造意謂定無要餘應説有分故我當觀察此説從彼義生識為現量言彼義遍説然彼非唯彼若謂所緣者而憶念等識非觀待於他又曰如所現非有故於勝義中五緣集聚故不作彼名言是中間頌由義相遠離非所詮此境以總相宣説故不作名言初頌説論軌非是世親論師所造論師意謂彼論無決定心要義故未辨説餘者若有心要則應分析辨説也餘應説有分句未見解釋尚須研考由於論師對彼捨置未辨故我陳那對彼所説現量等義略為觀察也此説從彼義生識為現量二句牒彼論所説現量定義謂從彼義所生之識即是現量也以下徵破若從彼義之語在文法中是遍説詞聲明中詞類之一種表普遍義者則任何識於任何境生者即立彼名即名現量非唯從彼生即非唯從所緣緣生識乃名現量也以本宗説諸心心所從因生故有本作從四生故似説從四緣生若謂所緣者謂從彼義是説識定從所緣義生者是亦不然而憶念等識非觀待於他謂憶念比量希求等識生并不觀待有他所緣境若定待所緣境乃生緣彼識者則緣煙等應不生了知有火之識也若謂緣色等説為義者試問識生為如所現即如是緣而生耶抑雖現為餘相而是如其所有因而生彼有何過曰若如所現而生識者如是彼緣集聚故五識應成世俗有以唯緣彼集聚故因五識只見集聚假相不見彼極微實體若謂現青等識從彼義所生識是現量者曰若許彼等為集聚者雖可實爾然計得實有行相由現實等行相故亦當得實及數等即實德業等若謂彼識是如其所有因而生者如是雖無現相應成實等之過如是則無彼等故此亦不應理識不現彼實物等相故如是則於彼等皆不得現量之名言以於彼等不能各各了知故彼等各各雖是集聚之因然不許集聚有實體故以是故説如所現非有故於勝義中五緣集聚故不作彼名言其第三句釋中譯為心所緣五種信慧譯此頌為若非從現相五緣集聚故從何為勝義彼不作名言總觀此頌義是指論軌説從彼義生識為現量試問彼義為説如心所現耶為如其實體耶若如所現者所現相非實有是集聚相故若指實體者實體勝義心不現彼相不能説是彼現量名言也又所緣等應即所緣性以勝義有故若不爾者則現非有之第二月等亦應成為現青等識之因其由義相遠離者即無義相者亦非所詮以一切識若離義相亦不能作名言也故此境之名言當以共相宣説不能以自相立名言故五識境即以彼共性相安立名言名為色等非以自性相安立名言故説五識境不能安立名言也二破正理派所説現量諸正理派者説根義和合所生識非作名言無有迷亂耽著為體是為現量此即敘計謂正理派計現量有數種差別一是根境和合所生識二不能作名言三無迷亂四耽著為體性彼亦不應理從根所生覺非有名言等應不緣有間識不得增上根不離所依非能緣於境樂等非所量或應有餘根若謂有意根無遮故得者餘根聲無義定義則無果應説離識相以餘義為果非差別異故彼非有二者非所別亦爾不知等非遍無返故非果彼亦不應理此即總非以諸差別皆非理故從根所生覺非有名言等此下逐計而破設立名言之境者是由比量心其諸根覺絶無名言之境不須簡濫由諸根覺不能作名言故不應作彼簡別詞也根覺亦無迷亂之差別迷亂唯在意識以彼是迷亂之有境故耽著是決定以於具足總等之香等都不分別無所見故亦非有即根識無決定耽著若謂是説如實智之回轉界限者其簡別詞亦不應理以不迷亂故亦説明一切識唯取自境義故彼所説之分別亦可各別宣説又所言耽著為體性耽著是果根識中非有如其義等了知之識即親果故若謂非作名言等言是為顯彼識自體性故者曰不然是説現量之相故彼由根義和合即成立故若是為顯彼識自體性故者亦應宣説非德實所造非虛空等所知境性故大為過失應不緣有間識不得增上此破根義和合生識為現量若計根義一切相合生識為現量者如於山等境應根境無間然現見是有間而取緣根增上即緣超過根量之境亦不應理若謂趣外境故則為應理根離所依趣於外境故緣有間及增上境亦皆應理者曰彼亦非理根不離所依謂根即住於所依之境故根能取有間之境義眼不離身能見遠山等假使根能趣外境然亦非能緣於境若餘者若能緣境則所依有障礙亦應能取境也是故眼耳二根唯依內所依身住非離身外而取有間及增上之境也樂等非所量原文或非所量因字所限移於下句此説若根義相合所生識乃是現量能量之所取方是所量是則取自身之樂等等取苦欲瞋勤勇等之心則非是量由不待因等既非比量又非根義和合所生亦非現量能取之心既非是量所取之樂等亦應非所量成大過失或字顯樂等既非現比二量之所量或應有餘量亦成過失或應有餘根此説取樂等之心既非根義合生則所取樂等應非所量或應有餘根與境義合而生識取樂等然此非有若為成立與餘根和合所生識為現量故若謂有意根無遮故得者説有意根以無所遮故得有意根者破曰餘根聲無義若因為無所遮故便能成立有意根者則説耳等餘根之聲應全無義即由無遮而成立故何須更説餘根也定義則無果應説離識相以餘義為果此破現量以耽著為體前已説耽著是決定義是量果若現量本身即決定義則無量果也意謂若以決定為性之識為能量則無能量已生之後了解增上義之量果也量果所解較能量更進一層能量只是緣境量果則於境決定若謂取能別總等之識是能量取所別之實等之識是量果者破曰非差別異故謂能量與量果非於差別境而分以差別境各異故於別境為能量於別境為量果不應道理如砍擔木樹而拔羅沙樹斷未見此事若謂由是所別識之因故亦是彼境者此亦不然太過失故若如是者一切作者應皆成一以是所別智之因便成彼之作者故是故若法於彼有業用即説此法為彼果應理彼非有謂於彼中非有增上了解之果亦無緣能別之量二者謂若計即能別之智是能量與所量二者如自了知我時既是所量亦是能取者破曰非所別亦爾若如是者則所別之智亦應成能量所量之二也若謂能知與所知雖是異義然能量與所量可是一體如自了知我之智曰彼亦應成二者也若謂能別之智與我相同者非爾二者皆應配合也不知等非遍無返故非果如是了解所知若謂從不知猶豫邪解中返即是果者亦不應理非遍於一切皆不知等遍於一切決定起不知猶豫邪解之境非有故於一類事稍一思惟亦能生知故假使有不知等亦非返故為果若説無不知等為返者彼非是有則非是果不觀察彼為所量故如是且説正理派之現量不應正理三破勝論所説現量諸勝論者説由我根意義和合所成彼是餘法此是敘計勝論派經説且唯由繫屬所成彼於實為現量又説由我根義和合所成彼是餘法有者計離量義為他是不共因故計根義和合為量有餘者説以最勝故我意和合為量若如是者與説由猶豫與抉擇智所成者是現量與有因智則成相違則四法和合所生之智與由抉擇所生者不同以抉擇者是以觀察為先行故現量者是唯見境故言唯見境者謂四法和合所生彼中何有觀察説根義和合為量者全無增上所説即如説根義和合為能量者欲知此為何義時應取一切義以與一切體性相合故其説我意相合者於各異境亦應於別境為量於別境為果無有此事如前已説復次觀待總別與觀待實德業是為現量不應如是説何以故有見境義故不合諸差別非一色等一若見彼非根餘根無義故異境亦能取一切根應取非實等若爾無故非餘境若許境同者非樂亦應成不定説為餘非説皆所立根雖無有異覺異故亦異餘由何無異以根義和合所生者有見境義故不合諸差別以諸根覺唯能取自義故與諸差別同時和合不應道理其謂此是此之總與實等繫屬必先取二義乃如是觀察彼復是念等故此唯由意覺作是差別方為應理餘則執香甘美亦應是現量此亦非理以能別與所別是異根之境故香是鼻根境甘是舌根境若謂是一實法多根所取者破曰非一如是則非是一如色等應成多法何處見色等多根所取而是一性若雖是多根所取而計為不異者破曰色等一色等如實亦應成一若見若外救曰諸根雖異然唯見實境唯由不異之識而見如有性與德性故色等不成一性與多性破曰彼非根若如是不異識而見者然彼非由根彼非由根門能知餘根之境何以故曰餘根無義故若計餘根能取餘根境者如眼根能取耳根境者則於色等施設多根應成無義若謂色等有異故一根不能取者此亦非理異境亦能取一切根應取謂自境雖異根亦能取對於自境青等各異與數等各異亦皆能取汝自亦許根能取異境故若謂取數等各異者非取餘根之境餘根之境如異色之觸境眼如何取若眼取觸實者則餘根之境亦是眼之自境是汝所許故雖是各異猶如青等眼亦應取觸等故異性是多根所取之原因以是不取餘根之境若境不異亦為多根取者則色等各別境亦皆應為一切根所取如彼實等如是色等亦應非一根所取也若謂無彼等過以彼色等各自差別決定由無彼故根覺於青等不錯亂問彼等之決定為何若謂何處無色性彼便非眼之所取如是觸等亦各自境決定若如是者眼亦於所觸聚轉非實等謂許實與數等及諸業等無有色性及觸性故故眼與觸不取彼等若謂如是何處有色性彼即是眼所取如是所觸等亦如是決定而有差別如是無色等故實等亦無決定破曰如是則與經相違經説由彼無故不錯亂是説由其色等於聲等無故不錯亂非説由色等有也彼等與理亦不符以餘根於無等觀察取者而非所取彼所取空如何而合色性等此段文餘本作不取者以無故餘根不取者是無所取如何是由色等作此是釋若爾無故文義若謂無因故不取者是故不應結合色等自境決定也無故非餘境句似説實德業等無色性觸性等故非眼等餘根之行境注釋中不詳待考外問如何見取實等不異耶曰是餘境據此句看頌中非餘境似誤謂眼離所觸外而緣異境有與餘同時行於總境執為不異之念智生非取色等無彼覺故此文似是説取實等為不異者是同時所生之念智亦即意識非是緣色等之根識以根識是取各異境故如是無差別故諸根皆各緣自境其遮餘義於境生不異之覺者一切皆是意識故於有性及德性所生識非是現量無表現故起增上慢以為現量所取者是惡分別所執耳若許境同者此牒外救謂能別所別同是根境其不取者以無彼覺故破曰若如是者非樂亦應成若二者同是根所取境者則實德業等是有實故應如有性實亦應是具一切根為一切根所取如是由有一實故實非有性然由是一切根故應成有性此皆非勝論派所樂許者若謂入實之有説為有彼一實者破曰不爾無差異故與有無異於一切皆有則實等非所遮如云於業德有故有非業非德若謂入於實者即實是一若入餘者則實非一如是則實應成異若時眼現量取謂不熱爾時所觸亦應成眼之所取故不應説如有性德性雖是異根所取性而實不異也若謂如是由是異根所取故應是餘性者破曰不定一根所取亦見實德業各異及青等各異根雖無異而取青等各異故若無彼法此法亦生則彼法非此法之因故各異根非餘法因者曰説為餘言是異根所取故説為多性則由是一根所取故由何定為非一非唯由是異根所取説為多性然非唯由是多性故説為不定此説根雖無有異非説皆所立非由一切根異説為多性是説彼根異唯是多故覺異亦是餘因無所遮故覺異故亦異餘由何無異除根異覺亦異不能説餘根異覺異者無時可説一性説於彼之德等生現量智應知亦遣彼等由與自所依繫屬門説四等和合如是非由一切和合生識如觀正理派時已説故勝論派之現量極難成立此段文信慧譯為此言根雖無有異非説皆所立非説一切多皆由根異然是説若根異彼即是多覺異亦是多性之因都無所遮復次根雖無有異覺異故亦異餘由何無異若根雖無異由覺各異亦説為種種則根異覺亦異者更無處可説為一也由此當知亦遣於德等識説為現量以彼等亦是由與自所依繫屬門説從四等和合而生如説非從一切和合生識如觀察正理派所説如是勝論派之現量亦有過失四破數論所説現量諸劫毗羅派許耳等轉是為現量此敘外計數論派説耳皮眼舌鼻等由意加持能於境轉謂於現在之聲觸色味香等如次緣取是為現量破曰無窮或一根二取非三境得一境無別彼非取自性不取義差別若取則如意亦應成分別應成彼分位非是薩埵等非是他性故非他應非果或若非他性則應非所取種種諸變異其義應相同取多故數論有別派不許一切各各性別有最勝塵由結合差別表示果體性三微塵自性由何證一果若異類和合亦不許轉變若不許二性果唯得一性於多義自性根境有差別故舍數論宗各各性為勝於非一境轉不説為能量非念未受故若謂二頓生彼非量觀餘失壞或是念增上説念故遣餘根無義無窮或一根若如所説諸根應無窮謂彼等計由非餘根所取境性故於自境轉即許為根唯由三德增減有異許聲等成為異類即一聲境亦由功德增減各異無窮盡故應許有無量根緣取或應成一根若彼三德無有差異是一種類者如是如取異聲亦應取觸等故應成一根以一切中三德無異故非有離三德之聲類若謂成為聲性者彼即非觸等若時由薩埵等形分位各異如何無聲等各異故有聲類不異相同之分位異於觸等於同類所取境耳根得轉如是於觸等亦爾故如何有所説過失破曰如是所觸亦應成眼所同境二取非三境以形是二根所取如山等形是眼及所觸識所見故此即除遣説唯於自境轉如計由形所作種類差別者則耳等應不能取聲等以形非三根所行境故由形非耳鼻舌諸根所取則現見聲香味等應皆非現量得一境無別又應於一境得多種形以一根之境有差別者彼之差別種類有衆多故當見一境有多種形又由形狀相同無差別故則用金等所作諸勺諸莊嚴具應無差異由形相同故金聲實等亦皆應相同如是亦應不各於自境轉又諸根轉為唯取自種類抑取樂等所差別之種類耶若唯取自種類者破曰彼非取自性彼唯取形故應不能決定聲等之樂等自性是唯取形故不取義差別應不能取義境之差別以僅緣形之少許現相不緣義境之自體故亦當不取聲等之差別也如是亦應緣琵琶聲與鼓聲等之差別以彼無別形故若取則如意亦應成分別若云取義者亦應如意是有分別若以自義有差別者若取彼差別則如意轉於自境界成有分別若謂是取由樂等所差別之形者破曰應成彼分位非是薩埵等即使如是亦如彼分位之意轉即是分別試問於樂等為各別取抑總取耶且非各別取以取自境等之根轉是於聲等所取非於薩埵等三德自性非是他性故薩埵等與聲等非各別自性故彼等非耳等轉之所取也若謂非他謂薩埵等非離聲等而是他性故彼亦是所取者破曰應非果若薩埵等非離聲等是他性者則不異身即一身之聲等應非是果薩埵等亦應非聲等之因其説薩埵為聲自性之建立等亦成相違又薩埵等互無差異而與聲等成一性者是無異之自性是則妨害計為因果是或聲之義復次若非他性則應非所取又若樂等非離聲等是他性者如是則不成為各別所取微塵亦應非是所取五微量等亦爾凡非餘義之根境彼一切皆應非根境其取為果性等者皆應成為總有境故以總為境也如是且不各別取若謂總取者破曰種種諸變異其義應相同如是則應一切根轉以種種相故若於種種相之所取取不異相者不應道理以由彼力決斷所取故現見於聲等取不異相樂等境性亦應相同諸根之境性亦應相同諸根應不於自境轉以於餘境有樂等種類別故以於餘境樂等種類異故如是亦應成為一根也若謂不爾應説各取形狀所作差別者彼説亦非理以取多故即色一類由形異門亦能取多種不見隨一形而取也若由異形許為異類者則根應成無窮也有數論別派不許此義古劫毗羅派有説觸等之三相非不異聲之三相故樂等有異而説諸根各取自境各於自境轉之諸根自境差別種類不異故諸根不成無窮破曰若由種類各異樂等境根各具功能勝出古師者吾當更有所説一切各各性別有最勝塵若由樂苦癡聲觸所作等各異種類應説一切皆有各異最勝之微塵即自性三德之異名由和合差別表示果體性彼只是由於和合之差別不超出自種類成立為果性而為諸根之境也三微塵自性由何證一果於聲謂是聲彼離樂等不異之覺於衆多義謂是不異不應正理何以故若異類和合亦不許轉變由三和合而成一果亦定非有諸數論者種類異故有一聲説非有一事非成一性若謂隨説三種自性之聲及説樂等其欲知自性即成根境者破曰若不許二性果唯得一性若謂耳聞聲等覺不待樂等有別於餘而於此轉者則彼唯應成一自性何以故於多義自性根境有差別謂於聲等義之多種自性中覺於何自性轉彼即根義唯彼是根境彼復唯是一種觸等亦相同是故非理故舍數論宗各各性為勝釋中作故於各各事校數論為勝謂計唯從一種類差別之自性為因而生果較古數論見實為殊勝如是若説不生異類果則為端嚴非三自性唯從一生也似是説非從三自性而生一果若計唯取現在聲而根轉是為現量如是則境非一於非一境轉不説為能量一切所量則非是境故遣其能量應無緣一切境之能量非説彼轉為能量於正領受根轉之意根由無因等不説為能量故成失壞其正領受根轉者不應攝入餘量之中若謂無彼過失彼轉之領受是憶念猶如欲等如云念是現量轉之差別是故根識是於外義之現量此與根轉是無間隔故是憶念此説領受根轉者是念破曰非念未受故無間隔之意不應是能取根轉之念以先未領受故必先領受而後方憶念若謂二頓生者彼非量則將根識與領受彼之意二俱遣除如是則境之因由有境亦應有也心境俱成所緣也爾時領受量根之意未説為量則爾時之轉者亦未説為量故俱失壞若許自證等則無過失憶念如盲人步行若有彼者乃説此念是現量之差別如是亦若取無間隔之根境者亦非是念以意未領受故以先未有意領受外境義觀餘或失壞或是念釋中作念或壞是念亦觀餘唯領受根轉故或未領受或念失壞言或聲者是觀察義如何失壞若計與於外義根轉同時生之意領受者破曰如云由一境義引生二根之功能不能觀察故當失壞若謂無彼過失為顯念意常時取故遮唯俱生者於俱時成就為於外義根意同時取耶攻擊其緣取之理若謂同於一時生與根相應之意前已説故雖然如是增上説念故遣若為增上説念故而破於外義與意同時者則如云由根取後意乃能取如是意取已乃能如根了知如是等説皆被遣除故於外義非有憶念若謂意親於外義轉者破曰如是則餘根無義諸餘根於外義轉則應無義以士夫義意能辦故意若能親取境則諸根無用也如是不能定取境之自性故數論之所説非是現量也五破觀行派所説現量諸觀行派説與有正結合所生士夫之根覺是為現量此敘外計次破云有所遣為無言合了知彼正和合顯示決定有性者若顯所對故應説根差別唯有非不知復何所成立若根於何事許融會吉祥融會餘亦有吉祥眼藥等共稱如是計根境無彼聲若義遍合者聲色有間隔亦見取大者能害無間隔捨説覺因聚何者為能量量或即是義何為添覺生離義根意士和合及作行餘説何者是生現覺因聚由牛等結合量義為牛等與義正繫屬根覺非有能所了自無示色義根行境一切非義識皆應住現覺若許覺之生説餘義為果非能得餘義現義覺是果由無餘果故若覺生是餘從和合自因從量和合生若非餘無義由士夫變異生覺應無常若我不變者彼不應為量其中有所遣為無言合了知彼正和合顯示決定有性者若謂為遣除無故而言有者不應道理以言和合即顯示決定是有故若言諸根和合或者疑問由何和合而言正和合答云和合所取為顯彼義故言有者若如是者若顯所對故應説根差別是説根差別為顯諸根差別故理應各各結合而説也所對即根所對之境若謂此中亦説與意等結合故以總聲説者總言與有合不言各別根境結合此亦非理唯有非不知復何所成立謂若僅與總有結合唯總有結合士夫等已成立彼於無不轉復何預再成立若謂陽焰等非有是似現量有者與彼亦相結合為簡別彼故言有者其特殊環境及日光所炙並大種差別彼等是有由彼與眼合引生意識漸生亂識故為遮彼而言有者不應道理若根於何事許融會吉祥釋中作有聲許最勝是説根端嚴依殊勝與端嚴解釋此説諸根於何境融會説彼為有或由何事使根吉祥説彼為有破曰融會餘亦有吉祥眼藥等謂微塵等亦能與諸根融會非唯義境與根融會使眼吉祥眼藥塗足等亦能使眼根吉祥明利與彼等和合亦應成為現量也若謂無有彼過譬如行生之聲表示牛類餘類雖亦有行生作用然不名行生如漢語呼畜生如是唯以義表示殊勝融會端嚴吉祥非以餘表示也破曰共稱如是計根境無此聲行生之聲唯表示牛者是世間共稱故如是計約定俗成而以有聲表示融會與吉祥則非世間共稱根境所有故由有聲如是妄計不應道理若義遍合者聲色有間隔亦見取大者能害世間隔若計根境一切遍合根乃取境者但見於聲色二境能取有間隔及大於根量者若遍合者則應不取彼二境當如香等取無間隔者然不見是事故能違害捨説覺因聚何者為能量有説量果為餘義者除覺生外不見有餘量果故計從何生覺彼即現量如彼宗説我等和合及有作行捨彼等外無餘覺因是則以何安立現量名言若謂量或即是義若説唯義是現量之因聚者如是何為添覺生只説與有正和合士夫諸根是為現量即足何為更覺生前説從何生覺彼亦是妄計復次離義根意士和合及作行餘説何者是生現覺因聚非由彼聚能生現量意似非由彼總聚能生現量或彼聚是能生非即現量也若計根義和合彼亦非是彼言現者住於二故正和合亦非現量此未各別成立故若謂由何決定此是牛此是馬彼即現量者彼亦非理何以故由牛等結合量義為牛等與義正繫屬根覺非有能唯觀牛性即在汝宗諸根覺中僅依爾許應無觀察功能不能判定是牛非牛若不結合而能決定為牛等者不應道理要由結合牛等之名義方能決定是牛等然根覺無此功能是故所別能別所詮能詮等一切分別皆是意所施設非是根覺何以故所了自無示色義根行境此説根之境義雖有多事然諸不共體性是根顯現所得之境以能生現自相之識各別了彼體性如識自分如是體性不能顯示所詮等以所詮等是總境故若謂總相亦是彼義亦是現量之境以是根境故及是一切行相之決定故若如是者一切非義識皆應住現覺非義識即無實境之識亦皆應成為現量也現聲於三處轉謂量識境此復量是真現現量餘二是假立境是現所量故假立名現識由依根與量相同故亦假名現若謂緣色等總相之覺不觀待根不異觀察而轉非依賴於根者若一切種義之識知色等功德性等義之識亦能緣餘識所行境者則衆多根應成無義如前已説故不共境之自體性方是根之所行境如是且説從何生覺彼即現量不應正理若許覺之生聞説覺之生起於外義為現量此迎外疑而答曰説餘義為果非能得餘義所以者何現義覺是果由無餘果故增上通達了解者是果以量非離覺是他故亦非離量而有覺果也若覺生是餘從和合自因從量和合生謂勝論派説覺是從自因和合大有等所生之果法若計根覺是從和合生者和合應成現覺彼是常故全不能生故彼二説皆非是量覺生是現與覺生是餘之二説若非餘無義若計覺與生非餘者即計生覺是一者如是覺即是現以是言生則成無用由士夫變異生覺應無常若計為生覺故士夫從前分位前無覺位變異而轉趣所量者是則士夫應成無常故得非所樂若我不變者彼不應為量若計士夫無轉變者則此與非量分位無差別故則從彼所生覺能為定量不應道理如是他派所計現量皆難成立
