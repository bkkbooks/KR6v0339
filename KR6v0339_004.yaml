body:
  text: 觀喻似喻品分二一敘自宗二破異執初又分二一說喻二說似喻今一說喻所說三相因善住於宗法所稱餘二相以譬喻顯示所立隨行因所立無則無同法及異法當說為譬喻以非遮而遮如是無有相由非作故常由壞此果性此說則不遍非樂等合離共不共相違亦應成能立一一俱未說故說為二喻如自所決定欲生他決定說宗法繫屬所立餘應捨非是離於因別說於譬喻為顯因義故比度非無義成因系屬故說二譬喻者喻應為別有別則同世間彼等說喻時但說諸同法捨能立所立成單純比度於彼異法中為非遮比度彼異法量式異品同時說若宣說返者或立所立因或是彼差別同說應無窮唯宗法是因有誤亦應成俱說不成者九中俱亦有已說譬喻言所說三相因善住於宗法所稱餘二相以譬喻顯示者謂諸因明論中僅說宗法性為因式如說此所作故了知聲是無常所餘二相因式中未說為彼義故當說譬喻所立隨行因所立無則無同法及異法當說為譬喻言隨行者謂一切行言同法者且如說聲是無常所作性故若說諸勤勇所發見彼無常猶如瓶等如是於異法亦說諸常住者見非勤勇所發猶如虛空當說此中亦是由能立門成立所立於同法中決定當說諸勤勇所發見彼無常則異法中亦決定當說所立無處則無即是顯所立無處無彼因也以非遮而遮如是無有相如是說前者是非遮後者是無遮理門論云前是遮詮後唯止濫如是則不許常法者如經部師不許虛空有體亦成異法喻也後以何緣第一說因宗所隨逐第二說宗無因不有不說因無宗不有耶由如是說能顯示因同品定有異品遍無非顛倒說若謂若如瓶喻如說因有宗必隨如是亦應說宗有因必隨也曰不爾不應說故瓶是為宗所隨之所作性差別而說故顯示語義主要是顯示決定之義也此數句文尚應研究與信慧譯本也大有出入復次由非作故常由壞此果性此說則不遍非樂等合離理門論頌為應以非作證其常或以無常成所作若爾應成非所說不遍非樂等合離若依同法門先因後宗說諸非所作皆是常者則應以非作證其非所立之常如是若依異法門先宗後因說凡諸無常皆是所作者則應以無常證所作性亦非所立之宗勤勇所發性不等遍之因應有過失謂如電等則應是常及勤勇所發性是其過失若謂縱有彼過若了知所立之因不顯示等遍者離無常外容有他故則不應說所立無處因定非有若唯依有事者則瓶無常性亦應由勤勇所發無則不生則不應說觀待外義而顯示當說等遍之因成立所立於此時中唯以義說所立無處因定非有不說異法喻若時俱說二喻爾時顯示異品唯有此句似有誤等遍者顯示所立無處因定非有則不應說能立所立之因顯有同法如是亦是障碍因隨成所立非遮其義此諸句尚須研究以說同品有及二故此段文信慧譯為若指定為諸非勤勇所發則定是常無常亦唯勤勇所發容成彼過若時指定唯非勤勇所發是常非說勤勇所發爾時則無過失此即是說常住於勤勇所發中無如是此中說無常從勤勇所發以指定因故則餘非有是由說者意樂所指定故於勤勇所發性說常性非有也曰此是異法若非爾者如於常中無勤勇所發故比量無常性如是勤勇所發常性非有故比量非勤勇所發故是成立非所立宗故應顯示唯因於所立無處非有也若於此中顯示所立無處非有性者則說無常性是勤勇所發當有何過耶如說常性是所聞於無常非有故此不共因亦應成為常住之因也若謂無過如說無常性是勤勇所發此中勢得成立所立常住如是說常性當是所聞非能於常住顯示為所聞性若勢俱得二者吾等亦許或以勢力或以餘事俱顯示故若是顯示因遍隨所立轉者彼離無常更無餘事則不應說所立無處因定非有若唯有者則勤勇所發性若無瓶之常性亦非有故則不應說觀待外義此即是喻當有過失曰周遍之因當說隨所立轉以於此位勢顯所立無處因定非有故不應說異法喻若時俱說二喻爾時是唯顯同品有周遍者謂顯所立無處因定非有也如是則不應說因隨所立轉也此亦是為遮所立隨因轉然此遮無義以說同品有二相故此中當說因之餘相以宗法性即由因顯示故義定應說唯同品有者如是由言唯同品有則於異品唯無同品應得遮義彼無處無是唯無處非有非異品無我等如是此中是唯所立無處無非於餘處若以異品能了所立者則成相違不相違眾多因謂正有之相違及所說正因由當說之同法喻應成不定其非質碍性於常非有亦應顯示是由於有事非謂由餘及相違無事由是言非勤勇所發者以勤勇所發與無常性相系屬故由無無常則當顯示無因異法喻者謂於常非有顯示因為無性非是顛倒縱非說非所作故常然此中以虛空等常為宗即成立非所作也如是由俱說對治品相違與不定故則不應說以上諸文似均屬反面義尚須研究非單說一一相應成過故非只說同法或異法俱犯過失如是則是說世間量式非是所立法如實之因相應成不定故為二種俱於喻語中說為說餘一種耶以是因故二種俱說若不爾者共不共相違亦應成能立一一俱未說故說為二喻單說同法喻有共不定單說異法喻有不共不定二俱未說有相違過故當俱說二喻若只說同法則亦當通彼無處於共因生疑若唯說異法則於所立種類亦無當成不共若二俱不說者則於同品不轉於異品轉故當成相違故定當說能對治品俱治相違與不定過若對已少極成者則隨說一相亦成能立如聲了達二義故隨以一相能俱顯二義故是以義勢俱說二相比知其義亦應觀此理於所比事定取此因已次念餘法彼同類有無則非有引生定解是故云如自所決定欲生他決定說宗法系屬所立餘應捨謂為顯示宗法性故說因言為顯示彼所比事及無則不生性故說喻言為顯示所比事故說宗言此外更非有餘能比支此中遣除他宗所計樂知合結等支若如是者喻言亦應非他以為顯示因義故如不別說合支此支亦不應說也亦非如是非是離於因別說於譬喻為顯因義故比度非無義謂三相因中已說所立性與因言故為顯示因之餘相故說喻言亦有意義若如是者成因系屬故說二譬喻者喻應為別有若因言唯說宗法性為成立因餘相故當別說喻支亦非如是別則同世間如是則如同世間所計量式之喻與因無系也彼等說喻時但說諸同法謂世間人說譬喻時唯顯示同法如云所作性故捨能立所立謂彼量式中無有所說能立所立之因成單純比度以彼量式未說為因義故單純比度即與因無關係之喻比度即喻之異名唯顯比度所立如說彼如瓶所作性故無常若謂由異法宣說能立所立者彼亦不然以彼異法亦不能顯示能立所立之因何以故以彼亦為非遮比度彼異法量式異品同時說謂彼亦只說於常住見非所作如世間人將非所作性與常住性顯示同時成立也意謂若說所立無處因定非有則顯因義若僅說常住見非所作只說明二事同時有不能表示因義第一句為非遮比度義尚不明尚須研究遮者為遮常住與比度此說為遮常喻與頌文相返如是此中若離因義別說喻者當唯說喻如世間說若謂雖未說因然由說喻亦能攝持所立也彼亦不然彼中亦若宣說返者或立所立因或是彼差別同說應無窮信慧譯為俱因唯所立或彼差別喻其喻應無窮異品當無返若如是比度者如說如瓶所作性故無常如是聲亦爾此則成為說瓶是無常亦不成顯示聲之決定若謂是說如瓶等無常非如虛空常唯比度所立者此則是顯從虛空等返之所作性若謂比度所立差別無常如瓶等者如是則是說從衣等返之所作性非與一切所立相應亦與宗義不相系屬唯以無常為宗故如是比度義皆不應理上說三種立喻皆不應理一給有因之宗為喻二給唯所立宗為喻三給宗之差別為喻如說瓶是所作性故無常則是立瓶為無常應更舉喻其喻之無常復應更舉喻所說相同故便成無窮此諸喻亦不能遣其異品有故信慧譯文較善若謂因唯是宗法性故喻應離因別有也若爾亦唯宗法是因有誤亦應成則諸似因亦應成因俱說不成者設作是思若唯說同法喻由彼容有錯誤之時機以於異品亦容有故若唯說異法唯無於彼當成不共因若俱說二喻則過非有也曰彼亦有過九中俱亦有九種宗法中初三及末三之第三因即第三句與第九句雖皆說二喻仍容有錯誤也已釋譬喻二說似喻無因所立二異品未作無隨行倒二種無隨行亦似無因等無喻隨行顛倒等未說繫屬故非有系比度是中間頌其似喻中言無因者如云聲常非所觸故如極微塵言無所立者如云如業言無二者如云如瓶其於異品轉者如說凡諸無常彼非所觸如現見業如極微塵如虛空等此等諸同法喻若與所立法相系屬者當各各說彼極成法若對不許虛空等常法者則有法不成無二中攝隨行顛倒者諸同法喻如云諸無常者皆勤勇所發性猶如瓶等倒合諸異法喻如云諸非勤勇所發性見皆是常猶如虛空倒離若都不說隨行唯說因與所立義及彼異法同時有如云勤勇所發故無常常故非勤勇所發如瓶與虛空此是無合無離有說雙具合離者即是譬喻其二隨行顛倒者亦說為似喻此復攝頌云無因等無喻隨行顛倒等未說系屬故非有系比度無喻應為非喻二破異執分三一破論軌二破正理派三破勝論派今一破論軌論軌中說決定顯示彼等系屬者是為譬喻如說瓶等此敘計下破云不應說彼等非互所立破亦非唯同法顯示其俱行若義亦說餘不應說異品若異品顯示無不生繫屬不取所立者則應全非有由彼成餘故即由顯能立應得非樂常非唯一喻過如前已宣說何為不顯示系屬者如云諸勤勇所發彼即無常如是言如瓶等亦不應理以所顯示非譬喻故唯以爾許不能顯示無則不生故復次不應說彼等何以故非互所立故若二俱有無則不生之系屬者如說勤勇所發故無常如是亦應說無常故勤勇所發是故應說是顯示因系屬於宗亦非唯同法顯示其俱行唯依無常性非能顯示因不錯亂若義亦說餘若謂說諸勤勇所發彼即無常義勢亦說於常非有者如是則不應說異品若以義了知成立所立者則說因與異品無則不生之系屬復何所為若異品顯示無不生繫屬不取所立者則應全非有若由表門顯示常住非勤勇所發即能成立勤勇所發是無常者則不捨少許也何以故以彼成餘故若非所立宗由彼常住非勤勇所發性能成立故則此勤勇所發成立無常無少許所作也即由顯能立應得非樂常若常性與非勤勇所發由表詮門能顯無則不生者彼則定應許為常住非勤勇所發與常住亦應互成無則不生也如說常故非勤勇所發如是亦應說非勤勇所發故常以顯示彼與異品互相系屬故如是亦非所樂以彼與異品無則不生之系屬非有以於二者非有無則不生之系屬故不應說彼與異品之系屬也如云如覺性瓶性說為不極成性之喻此中是唯說系屬之喻故是為成立所定說義故似喻性不應道理彼是說諸常住者彼非所觸此是似喻以非能顯諸非所觸與常住無則不生故如云聲是常非所觸故如覺如瓶其覺喻所立法常性不極成即前似喻中無所立者瓶喻所立法常與能立因非所觸俱不極成即似喻中無二者若不與宗因相違則不能說明是否似喻非唯一喻過如前已宣說非唯一不成義者是似喻過如前已說倒合離等皆是喻過二破正理派諸正理派者說由所立同法通達彼法之喻是為說喻由彼相違是顛倒喻此敘計下破執能了不見彼俱說應無義異門餘成故不合所立法觀待於說喻言如是結合於所立如是結合不應理總唯說為因別依自隨行非具對治品別門亦應爾此亦若離因義喻別有者則不應說喻定系屬於因義如是言所作性故無常猶如虛空亦應成喻故所立之異法同法於有性及所聞性等亦皆容有復次若喻由前簡別則普取所立之同法與異法於了不見彼以不說外義之喻言了解所立法應亦不能通達彼法也若謂通達彼法於因等後為簡別者如是亦俱說應無義則言通達彼法之喻如是俱說應全無義云何無義以言通達彼法者由成就同法義得成就所立與彼相違法除此無餘通達彼法言譬喻者亦是說具彼極成之法謂於何義是與世間假立之覺不同信慧譯為與世間覺相同較妥之喻且說通達彼法為喻不應道理以異門故以一切支皆是通達所立法之異門故不能得彼也信慧譯為非得彼功能意謂喻無能通達彼法故應說一謂由所立同法或由異法成立彼故除此無餘能通達彼法者故又若謂言由所立同法通達彼法者是所立有法之增語者如是亦由二者成為有法非由說了達義也若汝謂由成就所立與能立法是喻義者則雖成就二法由語義結亦不能通達所立之義前已說訖此中亦唯以能立而比度則所立法亦應說無窮說喻之果亦非為立已成之法何以故以餘成故謂果由能顯因亦如是成故否則此中由同法喻之所成辦則非是果餘者有說通達彼法是喻之喻彼亦不合所立法亦聲謂所立同法與異法亦爾能了不見彼故問於何由何何者何事不合所立法耶謂於此所說同法喻由喻所立之所作性等不應合於同法由瓶者謂所立之所作性等為同法是由通達瓶之所立法能作所作之關係非由有餘法而為所立同法也彼二句語亦由顯示義之喻故失壞語支故喻非理觀待於說喻言如是結合於所立如是結合不應理此中言如是者隨總結合或別結合皆不應理一切之總不能言如是故若謂且結合說所作性如瓶不結合說如虛空等非所作性曰總唯說為因總謂所作性故唯如是說言聲之有系屬故喻與所立非是一義言如是成無常性不與外義相結合不爾應成無差別之總也若謂成立所作性是與差別結合謂此所作如瓶非如衣等彼亦非理何以故別依自隨行決定依自者謂是差別非如瓶等所作從非聲發故如是亦無結合意謂別則瓶之所作與聲之所作不同瓶是從泥團等生聲是從顎齒等生各依自轉法喻不能結合也異法合者如說非如虛空非所作性若謂二遮是唯遮所作性者則不成為彼因義若謂不遮所作性是為遮與彼俱行之常者亦非如是何以故非具對治品未說因性是說所作之總由有所作法則非有對治品之時機若為遮彼結合異法為遮非所作俱行之常亦未說結合由是亦非具足對治品由同法門亦無以所作性通達無常性其具有彼對治品常性由何能遮若謂常性不極成故唯由異法能遮常性者如是則別門亦應爾若不說同法由差別門亦應能遮彼法對治品俱行如說是所聞故聲是無常瓶等無常由與非所聞俱行遮無常故應成非所樂之常性由成立無常性相同故此中亦應成常性言勤勇所發故猶如電等由於同法似是異法此中全不應理何以故由非如虛空非所作性故彼非常非唯非所作為常性因以由無彼不成為常此句似有誤無常性因非質碍等由無彼故亦非能遮無常性虛空觀待語義理可結合何以故以非所作性以外之常無有少許猶如虛空於無常性亦說如瓶故是無常如是結合亦不應理以上諸文是破合支於結中不說重述彼非別支不應宣說此文似有誤信慧譯為結由重言非是餘支故結非理原意似是說結支是重述宗義故非別支三破勝論派諸勝論者說二俱極成者為喻對彼亦云說虛空喻式或非語一分不說隨行相彼是喻影像能立結合義自續亦無義言俱極成者若謂宗因於虛空極成以是彼德故則一切皆虛空成喻若謂所立法於何成就彼即喻者則語支分不應道理不說隨行相彼是喻影像若不顯示因與所立之隨行彼即似喻二者之喻如前配說能立結合義自續亦無義若喻是自續即自在義者則應說非因義之一分也由是則能立非有亦非結合之義如前已說本品釋文過略與信慧譯本出入亦多須更研究如得西藏大德的注釋當詳加校訂
