body:
  text: 觀反斷品若量唯二種唯應說量何故亦說似量缺減性等曰諸說似量者顯非如理分宗成就相同故說缺減等有諸唯善語言於如說實成就宗之能立欲說為似成就謂是他性非彼能立為破成就宗故說缺減等成就過失此說諸敵人對於無過之能立量欲妄出缺減等過失說宗不成也對於無過之能立量妄斷為有過故名反斷或反決即似破名為顯彼性故及說彼似故此答說應理反斷是似答信慧譯為故為顯示彼言說應理答言說彼相似似答是反斷此說立者成就此中應答無缺減等為顯缺減等故所說應理故反斷者是有過答以彼不能知立者之能立過失彼無失故彼中會不會三時說因非所樂說會不會因缺減因相同如舉因之喻云勤勇所發性故聲是無常敵難云若此因與所立會合能成立者則與所立應無差別如河水與海會合非未成就若與已成會合者所立已成此是誰因若不會者由不會合則與諸非因無差別故亦非能立如是會與不會相同於三時中亦說非樂若於所立前因能立者因在宗前所立未成此是誰因若於後成者因在宗後未成就故則非是因若謂同時是因者因宗同時如因已有則不須成如牛左右二角如是非因相同此等與缺減因相同相似何以故以不具正理一切有喻之因皆遣除故若於此中唯以不會合之同法便說因相相同豈應道理即使應理亦說非是因如是若因先能立者唯名不可得故便說非能立者亦爾應成自害之過失此中破亦相同故此三段文信慧譯為若由唯不會同法於具因相而云當成非因如是唯於所立前而云不可得故此有何理破相同故當成自害之過失意謂以會與不會及三時之理觀察能破與所破汝自宗亦同犯過也如是且說覺為所立其因具三相言彼缺減是相似過信慧譯為如是且說言說為因覺是所立三相之因是似缺減當知所立有二一所生謂覺即比量智二所知謂義如無常性因亦有二一能詮語二義如所作性此處且約所立覺與能立言義因似不成若時以義為因爾時由於語言未破除故說彼義不成是相似性以非理破一切法之因故如前此說以義為因敵謂因不成者此因乃宗法性宗既成就其法即成故言因不成者是相似性即似能破因非不成故如二種因言說及義於所立義彼非因果事故非是能生所生乃能知所知能立所立彼等非理彼等謂由不會故及於所立前故便非是因皆不應理以理遣除為性應即能破以上似說缺減過性之似破說常無常隨彼非能無常說宗過隨順如說聲是無常敵難云應與彼無常之常結合以諸法所得自性永不捨故以是應成常性彼是常相同之似破此亦相似宗過此中堅著無常性故非離無常有余常轉諸事從未起而起所無而有當說是無常即彼分位亦以事緣事緣是聲明中詞當說是無常性如說果性等此中意說外人執無常異於諸法即於法上增益無常實非離法別有無常是說諸法從無而有有已還無名為無常即在現有之分位亦是無常言如果性者謂諸法自體成就觀待前因之作用而名為果非離法體別有果性如是說聲無常亦非離聲外別有常恆不變之無常性也先說由無因應無有所立未說同喻說如前如說勤勇所發性故聲是無常敵難云若由此因是無常者前未說彼因由無因故不能成立無常是未說相同未說相同是敵人所出過對彼曰增益說者語能立似不成若於某義說者先知自所比引生定智次欲今他引發定解故將彼義向他宣說彼義若無則犯不成他人由說者語增益宣說成立彼義於未說前則無彼義而諍彼義不成故是不成相似之似破此二段似是說出立宗過性之似破似少若說前能立若於言說之前增上增益是能立故是缺減因相似似缺因之似破於成立時若不說因尚成缺因此於未說之前則更非能立也此中諍論無一切因義故當知亦是喻缺減相似似缺喻之似破說前非因故不成相違語未生同信慧譯作生前非因故喻例如前敵難云言說之前聲應非勤勇無間所發性非勤勇所發故亦應是常如是所說即不生相同是敵所出過如是亦有二種許由二增益其中由增益說前為能立故是不成相似諸已生聲由勤勇無間所發性故成立為滅性彼於爾時亦是有性諸非勤勇所發性者以義增上增益為常性故是不定相似此說二種似破果由他性分顯不成所立彼果同喻如說云聲是無常以是果故如瓶敵難云若由餘瓶之果性所作是無常者何成此聲之無常是果相同敵所出過如是說者欲三種若諍云若說者說瓶之果性則於聲非有爾時是不成相似若諍云若說聲之果性則於瓶等之無常非有是相違相似若諍云彼聲之果性於常性亦非有者是不共故是不定相似又顯示同法故亦是喻過相似何以故是取總法比度非取別法以彼義各別決定比量應無故若取別相則無正因故不能比度決定諸義也所說諸異品同法喻成他為同法相同言成他者謂成反義為能作因喻如說云聲是無常勤勇所發性故異法喻如虛空敵難云所說虛空亦與無質礙等為同法故能成立為常如是此等因中以瓶為同法與彼異品虛空亦說為同法如是為同法相同敵所出過餘異法言由所說異品成立餘者二喻如前與瓶為異法喻如云聲是無常勤勇無間所發性故以瓶為同法喻敵難云若由與所說瓶為同法故由勤勇無間所發性聲是無常由與瓶喻是異法由無質礙性故則應是常如是又如聲是無常勤勇無間所發性故異法如虛空敵難云由異品喻與瓶是異法無質礙故則應是常是約異法相同為難如是等之相同顯余不成故共似有二種若謂此由與無質礙等同法異法相同故對餘諍論不成者云如吾等唯由同法異法不成汝亦如是彼是共不定相似然於前宗如無質礙性勤勇無間所發性則不定非有意謂如於後宗無質礙性於同法性及異法性是不決定而於前宗勤勇無間所發性則非不定故不相同此是共不定相似樂成相同故如相違決定若作是思如汝唯由同法而樂成者吾亦如是故是相違決定不定過相似以上是似因過之似破此無隨行故說是似喻過二種俱是不定相似以未顯示於有因處宗隨行故及未顯示無所立處因不有故如後宗義前宗亦爾喻相似之諍亦配無隨行由隨行顛倒喻所立合雜多唯由惡分別而相比喻如云聲是如瓶聲非虛空彼中如是合雜雖是顛倒然有隨行如云諸無常者皆勤勇所發及云諸非勤勇所發見彼是常如是作已應結云如是及非如是如後宗義前宗亦如是應相同故彼是相似亦應道理唯顯譬喻則前後二宗隨行顛倒相同如於瓶二法皆應理如是於虛空亦爾二法謂所立能立如是亦由因體差別似錯亂二種因一向決定前量式非有如是吾等隨世間量式轉顯示同法異法相同勤勇無間所發性許為一向決定事因說為似顛倒決定於前宗中未有如吾等量式顯示一向決定如是作同法相同亦唯是他性無繫屬故說別於同法分別同喻如前敵難云由瓶同法而說無常者其中縱有同法然由是所燒及眼所取等差別唯瓶是無常聲非如是非所燒等唯聲應常以非所燒及是所聞性等故由違所立而分別故是分別相同或除譬喻如餘法雖亦是所作性然有是所燒與非所燒等如是亦分別說是常無常聲常瓶無常故名分別相同此中由錯亂差別應常彼相似由不共亦爾此中由有錯亂及不共因如是應常或應能破此即是說由非所燒性等差別或由所聞性等不共法應是常故彼是相似似能破如自宗不成顯示他不成故應是能立若是能破則是共或不共不定之相似若是能立則是相違決定諍之相似餘相亦是不定相似如外道計非實非業之聲亦是不定相似若說與所燒並存之勤勇無間所發性是無常之因者則單獨現事與非眼所取性由實性等成為不定此並存決定之因亦非如是以單獨勤勇無間所發性亦具因相故是不定相似敵謂必須二法相合乃是因單獨一法則非因如單以現事或非根所取則非是因以實性等成不定過曰非如是以單獨勤勇所發性亦是正因故彼所說不定過是似能破應成一無別以是說同法時故彼等應成一性彼等指所立與同法喻敵對非所立法非所聞故如其無有由何了解為所立此句尚須研究言無別者謂應無差別何法與何法無差別由無差別故與一切無別喻如由顯示同法喻瓶故與諸餘法亦皆無別故瓶上所有一切諸法聲上亦皆應得由是一切諸法互為同法故皆應成一性此中亦應無差別故如瓶而顯聲差別性故由分別相同非有極大差別故是不定相似於前宗中非唯由同法說為無常及非唯無差別而說無常唯由不見無別而能遮返故是不定相似宗因無別故亦許似不成為顯異於前說無別相同故說亦字其中除與分別相同無差別外當說其餘無別相同謂由宗因之義無差別故喻例如前敵難云由非畢竟生故所立與因之義非有差別結彼曰如是亦是不成相似以於先無而生增益為所立性遂說宗因無差別故成者謂先有已滅當成為無復應說為無差別相同謂勤勇無間所發性既成立無常復能成餘法是無差別如是亦是妨害所立之能立即相違相似所燒性等是不定故於一向決定相違諍者當說若見則非能害又曰法能害所立亦相同無別因過似相違非有過後宗彼等謂同法相同等為後宗若由後宗於一向決定由同法等一向決定應成相違若於前宗由所說不定彼由破門及立門以相違及不定妨害所立而相諍故彼等是餘能破若見不能害如有相違者勤勇無間所發性於無常性是不錯亂如是非所聞性亦爾如是亦應說聲非所聞如是此中現見能害所聞性而不見聲常性由何能得無常性之比量能轉由立宗過性於前非所聞性不成於何若見一向決定則無違害如說第二塵必是一塵為先是粗色故猶如瓶等如諸極微亦能成立為粗色以瓶等諸法必以粗塵為先故於彼當有何解答成害所立故無害則相違於所立者此中於法或有法皆可若於彼成害彼即相違性宗由餘因顯是可緣相同若所立宗亦由餘因顯示者彼是可緣相同喻例如前成立無常敵難云此因於電等非有此外由現量等亦成無常若彼無而仍有則彼非彼因除彼之外以餘比量此非無常之因無遍相故如由林樹夜眠而成立有心也敵所出過對此亦云列衆多所立因與彼隨順若以餘因成立為常如是無常則成錯亂故以餘因成立則非是因彼於無無常不見若能作因成立餘果則不成為彼之因故非能了因故是不定相似因雖不能遍達所立事故似不成住聲非成立一切諸說不遍非能立者彼無無常復無餘因於聲亦非無假立為無故是似不成唯於所立無故是為能破彼因於聲非無於聲有故亦非一切皆能立所立如以蛇等所有夜間睡眠便以成立林中所住皆有心思由疑說義異於因起疑諍若由假立宗義因錯亂故說為猶豫因義於常亦猶豫相同是為反斷喻例如前敵難云勤勇無間所發性現見有顯有生故成猶豫此為說所顯抑說所生耶此不應理若由彼因言無常者為生無常者增宗似不定若見此勤勇無間所發性成立滅性如是增益無常生起彼不定故而起疑惑謂有由勤勇無間所顯如草水等是似不定以壞滅是所立故諸所顯者亦有滅性故是不定相似因則似不成當知說增益因若增益因勤勇無間所發故生而破除者是不成相似以是見為勤勇無間所發而說為因非是勤勇無間所生故非義許異品說成義解同如云若勤勇所發是無常者則以義說非勤勇所發之電等即應是常如是為義解相同敵所出過此由餘錯亂成所立彼似本由勤勇所發性成立無常性敵以非勤勇所發性增益常義彼是增益不定前已說故是不定相似彼亦非成立常住之因由何於所立當成不定又由勤勇所發性故成立為無常性敵諍云即無彼勤勇所發等電等亦成立為無常故彼亦是不定相似彼於常住亦非有故許應成相同二俱是因道喻例如前成立時敵難云且此中言唯瓶無常此有何因彼猶如似喻彼如現見瓶無常成立猶相諍者謂是無所立隨行之似喻故即彼相似前於果相同中已說無因隨行喻過相似此等是諸反斷方隅如彼諸反斷中由缺減等相似性非理而答如是其餘相同等增相同減相同響相同非響相同道理相同對喻相同分位相同亦爾亦皆非理皆是似破彼等唯由量式少許差別便成無邊非由義理差別其中吾等說為缺減相似不成相似等者是於能詮立所詮名否則應說為缺減諍相似似缺減諍不成諍相似似不成諍等如是其文太繁謂有處以不解反斷而顯示者是由彼與反斷相繫屬故有處以不定相中性顯示者是由與彼答相繫屬故言相同之聲是一切之結句當知成反斷相同也如是吾等且說諸反斷中缺減相似不成相似等論軌說反斷顛倒與虛妄相違性三過非表三各異論軌中說有顛倒性不真實性及相違性答說過失其中顛倒者謂同法異法分別無差別會與不會等中有因可得果相同等說為猶豫其中四種顛倒性者謂於一向決定因所比而言不定者謂由同法等說相違性一向決定者如與不定成顛倒亦是相違是不共住故如一向決定量雖是真實而言不定則是虛妄然能說為分別相同此不應理非無所燒性等便不見無常以扇風等無常性故他是以非所燒性及非眼所取性等說聲為常非以所燒性等成立瓶無常性對彼應作是說非所燒等非唯於常乃見然於無常亦見此是說他宗不定過失此於前者能遍若不能遍即非是因他非於聲以勤勇所發性故比度為非所聞而是以所聞性故說聲應常其答非與前宗相屬若謂以同法宣說實爾然以異法是顯由無所立則定無因非說若無所立便無非所燒性曰縱然如是然由隨行與倒返顯二種喻論軌中無如說無所聞性無見常性非所聞性亦不決定故非是常此數句尚須研究諸以同法及異法比度為常彼於此中若異法有性為喻者則見所聞性為無常性也似應是則見所聞性為常性也若如此作異法喻量者則云電是常非勤勇所發性故應無過失非勤勇所發之虛空是常及勤勇所發性是無常亦見一向決定他說第二無差別相同是諍無因彼中無顛倒故是說餘過如是以會不會非因相同等總遣一切因故又此非以能生宗義門宣說因過是以能了以彼與會不會之過失相繫故非顛倒因所緣相同亦非顛倒因以他亦非作如是諍論是說無常另有餘因然彼等是以不成所立故亦非是因若法雖無而彼能有則此法非彼之因如是當成此答否則前宗當說餘事第二非能遍故非顛倒因過疑因相同亦非顛倒因謂是增益所立與因義若由立宗顛倒而計為所說顛倒故則一切因應皆成顛倒未說相同亦非說為顛倒因他非以能滅為因是說於前已有說亦非說時得聲無常已滅壞故果相同亦非說顛倒因是以總內所攝之差別說故是故彼諸反斷未見為顛倒因非真實者謂應成相同與義解相同等其中且說應成相同非是真實以未見義因而說所立故此中亦能說為顛倒與相違以是未見言見之顛倒與相違故如是義解相同亦爾如未緣所立無而得緣無即非真實如是亦是顛倒與相違相違者謂未生相同與常相同等其中由無先生聲性故成相違若言無亦無常亦是相違如是亦非真實有是常故無則常性無故亦是顛倒故常相同亦知其相違亦能說是顛倒與虛妄以無常與常相違故如是亦是顛倒與不真實以說無常為常故是故諸反斷中顛倒非真實及相違性皆相合雜故不能說無有過失反斷相難答微理亦應知理觀察亦爾餘反斷少分微細道理謂同法異法相違而住由觀察彼反斷亦當成衆多反斷由彼行相與會不會因及異法相同等皆非是有於此喻中無有同法異法相違而住未說反斷等如說是牛故牛實不成而謂成等一切皆應廣以理觀察而了知如是諸餘反斷此說彼等少分謂諸餘師若立若破若彼相似僅略顯彼少分過失其各別廣破及各別廣破所量者於觀察勝論派理及足目派理中應知了知一切外道之所量唯是分別彼所遍計諸事非現量境故如彼所計不堪觀察問此由何義破其所量曰為顯此所量能量難以成立之外道宗無心要故及為遮止彼樂著故而造此論非唯由此能入如來聖教以佛正法非分別境故若棄捨彼聽聞大師法性無大劬勞當能獲得遠隔離故又曰分別力外道彼相未顯示亦違自量式非能成樂義由分別道引法性遠離失壞能仁教如是如來諸法相若趣餘義當觀察廣顯量蘊諸德失此中所集諸福善生生知滅無德宗願給衆生真解脫附注本論藏文有二種譯本一是持財護論師與雅瑪參賈譯本德格版論藏本二是金鎧論師與信慧譯本北京版論藏本今依前本參考後本譯成漢文該二本出入亦多尚難定孰正復有多處難以理解尚企賢者更加研討諸有誤譯亦盼校正
