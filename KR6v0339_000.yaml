front:
  text: 出版前言集量論是古代印度著名的因明學家佛教大論師陳那約當西元五六世紀的代表著作為唯識學派主要依據的十一部論典之一此書梵文原本至今尚未發現唐代義淨曾於景雲二年七一一年翻出漢譯本但不久即亡佚僅存藏譯本西藏僧人先後兩次翻譯集量論一為金鎧信慧譯本一為持財護雅瑪參賈譯本均收入丹珠量論部一九二八年呂澄先生據那塘卓尼版本譯出集量論釋略抄是一個節譯本刊於內學第四輯現代著名佛教學者謝爾巴茨基生前曾有志翻譯集量論但終未見其完成在印度著名邏輯史家維蒂雅普薩那於本世紀初根據藏譯本最早對集量論進行研究公元一九二六年著名學者朗德爾輯録了其他梵文典籍中引用的集量論原文略加解釋寫成陳那著作殘篇二十世紀三十年代埃因迦爾借助集量論的梵文片斷將集量論由藏文還原為梵文但僅刊布現量一品此外著名的梵文學者屠寄宇井伯壽等也曾輯録過集量論的梵文片斷第二次世界大戰以後印度耆那教的賈姆布維賈雅再一次將集量論由藏譯本還原為梵文大約還原了三分之一左右恰特基庫普斯瓦米等人也發表了關於集量論的研究論文日本學者武邑尚邦宮坂宥勝服部正明北川秀則等人相繼翻譯研究集量論撰寫了不少論著但迄未見到全書的日譯本歐美學者對集量論也做了一定的研究主要有德國弗勞沃奈爾的有關論文集量論共分六品章各品皆分兩部分先立自宗闡述著者的主張後破異執批駁其他派別的主張立自宗部分所闡述的內容是研究陳那因明學説的主要依據其中有不少可以補充漢譯佛典之缺略破異執部分保存了豐富的關於論軌佛教古因明的代表作正理派勝論數論觀行派彌曼差的資料對於研究印度哲學史和邏輯史具有重要參考價值第一品為現量品量指知識來源認識形式以及判定知識真偽的標準等現量即感覺這一品前半部分闡述了陳那關於認識論的主張首先概括説明量只有兩種現量與比量因為認識的對象只有兩種自相與共相現量以自相為對象比量以共相為對象接著指出正理派以及其他派別所主張的聖教量和譬喻量皆假名量非真實量然後具體説明真正確的現量必須離名種等結合之分別即完全排除概念的作用真現量共分四種根現量意識現量自證現量瑜伽現量似錯誤的現量有七種前六種加入了概念的識別作用第七種雖未加入概念然非有體即不是實在的感覺最後解釋量果依次列出三種説法在這裡陳那依據所量能量量果三種劃分論證存在著相分見分自證分的三分説這是陳那對佛教認識論的重要發展在哲學史上産生了一定的影響這一品的後半部分批駁了論軌正理派勝論數論觀行派關於現量的主張這裡集中了認識論方面的印度哲學史料第二品為自義為自比量品比量即推理前半部分立自宗解説因明論式三支作法中的前二支宗與因首先概括説明比量分自義比量與他義比量兩種然後具體説明依據具足三相的因理由根據考察所要推定的道理就是自義比量三相即遍是宗法性同品定有性異品遍無性三個方面如果這三個方面都具備因就是正因如果缺少其中的任何一方面便是似因因屬於能比支所比支是宗即論題宗的有法主詞與法賓詞需要為辨論中的立論者和論敵雙方共同認許極成因而它們都不是立論者所要成立的東西非所立以法簡別之有法即以論題的賓詞所説明和限制的主詞才是所立最後明確指出宗與因所比與能比之間的邏輯關係這裡的內容對於理解因明推理的本質以及陳那在印度邏輯史上的貢獻具有重要意義第三品為他義為他比量品首先概括説明在自義比量的基礎上為使他人能夠理解立論者所推知的道理而説出具足三相的因叫作他義比量即把在思維中所進行的推理用語言表達出來然後進一步辨析所立與能立即宗與因所立需要具備以下條件立敵不極成隨自所樂不違背現量比量自教以及世間共許的道理如果不具備其中的任一條件就是似宗接著指出論軌和正理派關於所立的主張都是錯誤的不完全的需要加以破除在解説能立時陳那詳細闡述了九句因這是他對因明推論的重要貢獻大大促進了印度古代邏輯學向演繹推理的方向發展第四品為觀喻似喻品集中説明三支作法的第三支喻首先指出因支在形式上僅能表現出第一相遍是宗法性其餘二相需要以喻的形式表示同法喻顯示同品定有性異法喻顯示異品遍無性因此喻在本質上屬於因的一部分正理派主張宗因喻之外還需要合結二支這是多餘的應豫廢除陳那把五支作法改造成為三支作法在印度邏輯史上具有劃時代的意義最後剖析各種似喻第二第三第四各品的後半部分均為破異執保存有豐富的印度邏輯史料其中有些是現存梵漢文典籍中沒有的資料對於研究印度邏輯史具有重要價值第五品為觀遣他品呂澄譯為觀遮詮品首先排除其他各派都主張的聲量指出聲量非異比量它應當包括在比量之內然後剖析聲語言的本質認為語言是由假設而立的沒有真實義指出聲由遣他門而顯自義即語言是通過排除其他性質來表達對象自身的性質在這裡陳那提出了因明的概念論中最有特色的遮詮説每一概念在肯定某種性質的同時就否定了與之矛盾的其他性質隨後重點分析概念的類別揭示了概念的種屬關係這裡涉及聲明梵文文法的一些問題十分難解唐玄奘傳譯的因明中這一部分極為簡略呂澄先生的集量論釋略抄也略去了這一品現在我們從本書中得以了解因明的概念論的內容這一品還隨處批駁彌曼差勝論數論關於聲的主張為研究古代印度邏輯中的的概念論保存了珍貴的史料最後指出其他各派主張的譬喻量也包括在比量之內應豫廢除第六品觀反斷品呂澄譯為觀過類品集中考察對於正確的推論真能立所提出的各種錯誤駁論似能破這裡共列舉十四種相似過失可與因明正理門論相互對照這一品的內容是在正理學説的基礎上建立的尚未加以根本改造集量論頌釋皆陳那作文詞簡奧義理艱深編譯者法尊研究藏文佛典五十多年為國內外知名的佛教學者在本書中他對陳那的釋文詳加串解并參照因明正理門論等漢文佛典隨處附注本書依據德格版的持財護與雅瑪參賈譯本并參考北京版的金鎧與信慧譯本對於兩種藏譯本的同異優劣做了一定的考訂辨正由於編譯者譯此書時已是八十歲高齡視力與身體均極為衰弱不能參考更多的資料對於本書的譯文他本人未盡滿意集量論略解序集量論的作者陳那是世親門下著名四大弟子之一他在因明方面的造詣勝過世親對因明有劃時代的巨大貢獻集量論是他集因明學大成的主要著作他繼承了前人的學説又有獨特的創見所以後之學者把陳那以後的因明叫做新因明約於公元六世紀陳那出生在南印度一婆羅門家庭幼年先拜婆羅門老師學藝繼拜佛教小乘犢子部軌範師浪波晉為師法名厥吉浪波舊譯為陳那大域龍或方象當他求軌範師教其修禪定斷煩惱之道時師教其修離蘊不可説我之説并教給探索不可説我的祕訣他遵師教修了一段時間竟未能找到所謂離蘊不可説我自以為必有內外障緣於是白天在陽光開朗之際夜晚在燈燭照明之下露出自己的軀體雙目眨動向四方探視而終無所得他這種奇怪的修法遭到了同道們的非議并把這些情況稟告了軌範師師問道汝為何如此修行答弟子愚魯軌範師所教離蘊不可説我之理遵循修行終未覓得故疑自己是否有內外障緣故作如是觀行這段話表面上是匯報了他修行的經過實際上是指出了那種理論的渺茫性軌範師因而指責他攻擊了自宗之理遂把他驅逐了當時他本想據理反駁軌範師的觀點但覺得這樣做有違禮儀所以向師叩頭辭別轉去拜世親為師閲讀佛教大乘教典研究彌勒學説他特別擅長因明據西藏學者多羅那他印度佛教史記載他最終能背誦五百部經典包括佛教大乘小乘密乘及咒語等後來他去窩芝庇廈地方的一個森林裡住在非常幽靜的拔惹瑟納岩洞專心勤奮修持過了幾年因不少異教徒去那爛陀寺要求僧衆出來辨論當時那爛陀寺僧人中沒有能夠出來答辨的人遂從東印度請來陳那他運用因明推理論證的法則和技巧三次駁倒了來辨的異教徒使他們拋棄了異教的主張歸依了佛教此後他周遊講學著書立説名震一時他決心把量理學思想集中起來寫一部書以解釋佛學的旨趣這就是陳那寫集量論的緣起他山居岩洞裡首先寫了集量論的歸敬頌即在寫書的本文之前表示歸敬教主佛陀的四句贊頌文傳説當時他把這頌文第一次用石筆寫在岩壁上即出去乞食頓時光芒四射大地震動異教徒祖師為之愕然那時在該岩洞附近有個異教徒名士杰那波他對這種突然出現的景象深為驚異心生嫉妒乃乘陳那出去乞食的機會來把陳那寫在岩壁上的歸敬頌文擦掉以後陳那又寫了第二次也被擦掉了又寫第三次并在頌文後面寫道是誰擦掉我寫的歸敬頌文如果是嬉戲那有什麼意思呢如果出於嫉妒之心倘有膽量為何不敢露面如果願意展開辨論那就請來吧隨後仍發生擦掉頌文的情況當陳那乞食歸來正與那人相遇按古印度辨論的慣例同那人用各自的宗教信仰作為賭注展開了激烈的辨論他以高超的辨才和論理修養把敵方駁倒了三次之後説你辨輸了可以歸依佛教那人惱羞成怒仍不服輸因此陳那産生悲觀消極思想據佛教徒記載説他受到文殊菩薩的靈異啓示并勉勵他造集量論陳那遂發願造成此論陳那首先寫完集量論本頌繼而又寫了集量論自注還有他的弟子也為此寫了不少注釋在印度大約有法稱的因明七論護善的成外境論成一切智人法勝的成剎那滅壞成遮餘等等集量論等量理論典傳到藏地之後如薩班貢噶江村宗喀巴羅桑札巴等藏族學者都為它寫過注釋專為集量論寫的注釋有賈曹達瑪仁欽的量經釋等集量論藏地學者稱為量經即量理的經典著作共分為六部分現量品自利比量品利他比量品觀喻似喻品觀遣他品觀反斷品各品所闡述的內容儘管有所側重但總的説來乃為區別於舊因明而成立陳那有所創見的新的因明學體系從陳那的誕生經歷我們可以看到陳那先是學佛教小乘理論僅有自求解脫輪回的思想後來才信仰了大乘試圖廣利衆生足見他是在思想境界出現一大飛躍的情況下用集量論闡述大乘佛教宗旨在集量論中陳那從兩個方面論述量理法則首先擺出自己的主張即所謂立自宗其次是批駁其他教派如論軌正理派勝論派數論派觀行派等的主張即所謂破異執從這些立破推理論證的過程中我們可以了解到佛教與其他教派各自的主張及其爭論的焦點這對印度各家哲學思想的探索極有參考價值吾師法尊是近代赴藏求法學者中德學兼優的翻譯家他一生孜孜不倦地做譯傳工作做出了不少的成績集量論的翻譯和集量論略解的譯編是在他年近八旬病魔纏身視力極為衰退的情況下完成的也是他從事譯著的最後一部作品他一生勤學苦研堅韌不拔勤勤懇懇地從事翻譯事業的精神足為後人學習楷模這部遺作在研究藏傳因明學方面有一定的價值自己深感集量論自印譯藏成為藏族文化思想構成的重要部分至今在藏族的意識形態領域中還存在著廣泛的影響至於和邏輯學的關係就更見密切因為它本身就是屬於邏輯思想體系的對它進行發掘和整理對印藏有關陳那因明學説的論述進一步作全面的譯傳和研究是一件很有意義的工作在對譯者法尊法師表示敬佩悼念之餘雖自顧無似願以他的堅持傳譯的精神作為榜樣作出個人應盡的貢獻并以志嚮往編輯部前言近有研究因明的朋友因感因明學之論典太少勸余將陳那菩薩之集量論譯出以利學者余昔對此論未經師授可參閲之注疏亦甚少有諸奧義尚待研尋今姑草出未為定本聊供習因明者之參考云爾法尊集量論略解陳那菩薩造沙門法尊譯編論前義解論題釋造者譯時禮等略而不説論正義中先禮贊已誓造此論敬禮定量欲利生大師善逝救護者為成量故從自論集諸散説匯為一為起敬重心故由因果功德圓滿門中禮贊成為定量之如來世尊因功德圓滿者謂發慈悲菩提心等意樂圓滿與宣説正法等加行圓滿果功德圓滿者謂自利功德圓滿與利他功德圓滿自利德滿即成就善逝具三種義一極善殊妙義如士夫相貌端嚴二永不退轉義如疾疫永除三無餘圓滿義如寶瓶充滿此三如次勝出外道離欲及有學無學新證自利功德利他功德圓滿者即以度生義救護衆生隨種種機説法化導令離生死究竟涅槃敬禮具足如是功德之佛世尊已為欲成立諸正量故陳那菩薩從自所著理門論等諸部論中集諸散説匯於一處造此集量論次廣説論義分六品
