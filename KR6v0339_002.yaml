body:
  text: 自義比量品次解自義比量品分二一立自宗二破異執初又分二一總說比量二別說自義比量今一總說比量言比量二者謂比量有自義比量與他義比量下各別解釋分為二品二別說自義比量有二一說比量義二辨比量支今一說比量義細科從略自義三相因見義果如前境及性不同彼二自相非所顯所取異是餘見等門顯示非詮說自性由名了知故顯示餘行相是二種意識亦見非總故非爾表總故以信語能立亦障礙所餘若謂成不異否異亦有故信語不欺誑同故即比量言自義者謂自義比量其定義謂由具足三相之因觀見所欲比度之義因三相如下文廣說其量果亦如前現量品所說由所取能取二相二種了解而明量果若爾二者有何差別曰由境及性不同彼二現量之境謂自相比量之境謂共相前品已說現量之自性是無分別覺比量之自性是有分別覺問何故比量分二非現量耶曰此亦由所取境各異故現量之境是自相自相非所顯故不可分為二也若現量之境義能施設名言即由彼聲應成比量故現量之自相境不可以名言也或曰於現量之境義亦見有比量轉如由色比所觸也曰雖有見此然比量趣彼義非如現量是餘是由先見為因乃比度所觸謂於彼色捨離現量行相由色之總比度觸之總其現觸之差別非可顯示故是故二量之所行境非是一也若謂如於見等說名見等故如何說現量境不可顯示耶曰此不相違見等門顯示非詮說自性此僅由見聞覺知等因由門詮說彼義非由自性詮說謂於眼識所見之義次由意識了知為青說此是青此段文信慧譯為他問唯於眼識所見之義次由意識了知為青說此是青即是比量亦能緣自相境之意次答文為雖同緣一色但眼識現量是緣其自相意識比量是由名了知但緣共相即餘行相也此復由名了知故顯示餘行相是二種意識自了知即自義比量宣說即他義比量謂先由眼識領受遮非青義遮其非青返詮是青次由意識得知是青立青名言故說二種意識前云自相非所顯故所了解之體性即自相是現量之境其總相乃比量之境為言說所說若謂不應說一切比量皆是共相有境皆緣共相何以故亦見非總故言非總者謂所見風等自性由觸等比度也如云所觸者非所見之觸等曰非爾表總故非是比度彼風等以是表示為觸等功德之所依故或非比度風等自性差別僅是於彼實之總表示為觸等之所依實故若謂由一切之後成按本論中無此頌謂排除一切之後即成比度風等自性如云所觸者非所見之觸等曰不爾彼有不成故遮返亦同故若風等成就者不返亦有餘本為返則非有意謂若成就有則應永無非有也舍棄由與功德差別系屬比度功德之總而以功德之差別比度實之差別此是不能成立為有也觸是德句之差別風是實句之差別以有觸而比度有風是錯誤不能成立按比度有理以狹證寬不能以寬證狹以有別德可比有總德以有德可比有實以德依實故然不能比某一別實除非是唯一所依之實但觸屬多種實不能比度定有風也遮返亦同故者謂若遮觸非地等所有則亦能遮非風所有不見功德之差別謂是風所有非地等所有也若唯以不見而遮見故亦不應理唯以可見有對有礙比度意之功德故意德是無觸不能成立必無所觸要由可見比可見故由不可見比不可見故其所觸者唯是可見也又彼功德屬多法故此當屬誰成為疑因故遮一切比度有風不應道理復次以信語能立亦障礙所餘謂此若比度實總已捨棄比度於彼有以有觸德比度有實已不進而比度有風而改以信解語量遮於餘實有而成立於風有若是風有如是亦定餘有是故說有風等唯由教成立耳若謂成不異者謂若說教與比量等成不異故比量亦應緣自相境者曰否異亦有故有說由是世間所共許故不應更說譬喻是為聲教異於比度之差別如是若由共許故不應說譬喻者如由烟比火有義之比量亦應成為聲量也餘有說聲量是將聲義計為不異非直比度其義是其差別意為比量則比度實義也若爾聲計為不異當說如何比度其義若謂樹聲所詮義即實聲已了之義非是餘義然由異門了知從非實返雖由樹聲已能了知從非實返然是由義了知非由聲了知也若爾則除樹等詞外餘聲亦應說為量以作用聲亦能由義了知彼義也即不說彼名以義了知彼義如不說實名以樹聲了知是實如是不說樹名以楊柳等聲亦能了知是樹也又有說唯語是聲唯由彼聲自性了達義故是為聲量與比量之差異此中意說離聲之因是為比量聲量無有系屬其不共境當以二相比度觀察謂可見義與不見義於可見義謂顯示其名於不見義則唯是分別非能了達義之差別即說聲量亦不能緣自相也若天趣等聲不能詮唯義者意謂說天趣等極不現見事之言教若不能詮說天趣等事如何成為比量耶曰信語不欺誑同故即比量謂受持可信解之語言亦不欺誑相同故即說為比量對於超越根境之極不現事唯依可信解之聖言量乃能了知非是現比二量之境故由信受彼言教依之修行即能得彼果全無欺誑故說彼言教亦是比量非彼言教能詮彼事自相也如說諸名業之義以現量為先故此等亦當破比度最勝等自性是故比量之境非是自相二辨比量支分二能比支所比支初又有二甲說三相正因乙說缺相似因今甲所比同品有於無性為無此亦得能知依能知時故言所比者謂由法差別之有法若以現量或以比量見彼之後於彼同類亦以總相理於一切品或於一分成立為有何以故以說唯同品有用指定故而不應說同品唯有故次說於無性為無者重為決定彼義於無性處唯為無性非於所餘亦非於相違唯無所立名為異品非說餘法或相違法名為異品言於所立同類有及於無異品無性此等是說由三相因了達有因也若謂應說能知曰不須別說何以故曰此亦得能知既未宣說如何得耶曰依能知時故此中說因是依能知而說故此復知者能知因要待了知自體方是能知之因非如作者能作者不待作成故故說能知之因時即亦義說能知之智也若三相成就即說為正因乙說缺相似因一一二二相非因義義知聲常所作故有身非量故非身所聞故眼取故無常其有一相者謂若因於所比有即宗法性於同品無於彼無異品非無如立聲常所作性故又於同品有於所比無於彼無非無如立聲常以有身故有質礙故又於彼無為無於所比無於同品亦無如立聲常非所量故有二相者謂若因於所比有於同品亦有於彼無非無如立聲常非有身故無質礙故又於所比有於彼無無於同品非有如立聲常所聞性故又於同品有於彼無無於所比亦無如立聲無常眼所取故當知此等以義了知非是因義即成立為六種似因乙所比支分二甲正說乙釋疑今甲正說有許因不亂餘法為所比法有法成故有許繫所比因於法已成彼比何餘法如是何不許有法即所比系屬非有二如是成六聲不說義說故非此因系屬因無錯亂者從法於餘顯彼成則了解具彼之有法有說現見烟與火俱轉非與有火之地方俱轉故唯火是烟所比度法有法成故有許繫所比有餘者說火與地方皆是世間已極成性故火與地方皆非所比唯彼繫屬是烟所比且答初說曰因於法已成彼比何餘法若於火餘法有烟因可得者則彼烟因復當比何法若謂由火與烟繫屬何義即憶念彼者如是何不許有法即所比若由於火繫屬之地方有烟可得而比度者何故不許彼火相應之地方即所比耶非不了知彼處有火也次答說彼等繫屬是所比者曰繫屬非有二若處有烟則彼處有火如是言說非說有火或烟之繫屬等非說於繫屬有火及烟復次如是成六聲若以繫屬為所比者則有繫屬之火應說為此處有火之系屬得第六轉聲非說於此處有火也若說於此火繫屬或繫屬於此火是以初轉聲說不說謂不說自法之繫屬故非如是比度也若謂義說故由說於此火其義已說繫屬者曰由前所說道理即知彼非烟之所比故非此因繫屬謂此因與無則不生之繫屬非所顯示於火則爾若謂無過如火烟相應之地方與無則不生之繫屬非所顯示然彼是所比如是於繫屬亦應爾曰應捨彼建立何以故曰因無錯亂者從法於餘顯彼成則了解具彼之有法謂火與烟無則不生之繫屬要先於餘處顯示之後先在餘處見到火與烟無則不生之關系次於別處雖唯見有烟以若處有烟則彼處有火亦能顯示成立有火若不爾者不能顯示各別餘處所立火與烟無則不生也若先未於餘處成立其不錯亂之關係則不能於此處見烟即知有火故是顯示共同所依以說若處有烟則彼處有火故是故其因與法之不錯亂先於餘處顯示極為應理故唯法非是所立系屬亦非所立所立即所比度事乃以法簡別之有法如成立聲是無常某處有火非但成立無常與有火也乙釋疑分二子釋能比所比疑丑釋和合繫屬疑初又分二一分釋攝頌今分釋於因隨顯法餘觀察亦轉因於多法義非了達一切決知所系屬能得離餘法由德香妙香彼差別次第遮其非實等漸達青蓮等若謂如現見因由表門轉應一切不知或應知一切若謂由總者彼亦應成餘未見所依故不見無異一如此少分理不成於有因彼法雖衆多餘者是能得若因能比度所立法者是否能比一切法差別耶曰不爾彼因只能成立其關係不錯亂者故因於所立法尚須觀察以彼極成之有法有多種法義其因非能成立彼一切差別義皆能了知故曰於因隨顯法餘觀察亦轉因於多法義非了達一切不了達何等曰如以烟比知有火時不能比知火之燃燒情況及熱度等諸差別義於彼有錯亂故若爾能比知何義曰決知所系屬能得離餘法謂除所系屬者外餘則非火其實性德性等此等唯能得從非實等返如火唯得從非火返自系屬法如是此亦於一切非火處不見於餘則見也由德香妙香彼差別次第遮其非實等漸達青蓮等其中由功德性從非實返即遮非實餘亦例知香性從非地實返妙香性從惡香總返妙香之差別殊特妙香從非青蓮等返一一通達也此皆說明比量等心是遮餘而緣境若非爾者若謂如現見因由表門轉應一切不知或應知一切若如於火見烟後時亦如是轉者則終不能了達如不見一切火亦應不了達此火總之以表相緣境一緣則一切緣一不緣則一切不緣都不簡別若如所見而了達者則於明了猛利熾熱等差別亦應了達也若遮其非火以總相轉者則表相門轉亦應以彼總相而觀非以別相觀也若謂由總者彼亦應成餘未見所依故不見無異一若謂離火有餘火性是為總者彼且非有離火無餘火性假使是有亦無可見以未見一切所依故各別火則由多法所成之二等共法總必定非有諸見總而取者與未取所依者亦應相同也未取別法所依則必不取能依之總若謂取一所依亦即取一切者另本為所一總依即取一切彼如所依亦應成多此復所比量者唯由少分了達如此少分理不成於有因彼法雖衆多餘者是能得第二句按注釋義應為而了達有因不成於有因不好解謂烟唯少分是從火不錯亂烟性及灰色性即烟色等是能得彼火者即唯烟及烟的別法等能證有火非實性等有錯亂故實性等寬不能為因證明有火狹因能成寬宗寬因不能成狹宗犯不定過攝頌諸有因系屬有因是所解差別非所解於彼錯亂故有因隨系義所解非彼別於彼了解者了解錯亂故有因即宗彼之系屬即彼之總法如實等轉宗猶寬如是有因是此中之所了解即所比知法其有因之差別如火之熱等則非此因之所了解烟因於彼差別法有錯亂故第二頌義亦相同有重復之過信慧釋初頌說有因之總是因所了解其差別則非因之所解次頌說因所系屬義即因之總法非能了解有因即非正因如所作性之實等其因之差別義則是能了解之正因初頌說宗之總別次頌說因之總別似較正確丑釋和合系屬疑分二析疑攝頌今初系屬雖住二是因有因俱如所依能依非如和合性因唯有有因餘唯有因有因有因系定彼違返而住許因之周遍彼分是有因能遍非能了如有角於牛所破各無亂是觀待系屬故因於有因雖遍非作者若謂系屬如和合性俱與二者系屬故有因之法亦應為因因亦應為有因法者曰非爾系屬雖通二處然因與有因俱時而住是如能依所依各別決定能依非所依所依亦非能依唯由系屬非能成為所依能依法或與能所依法相共同處如是亦不成為因與有因也要是能依所依之關係方成為因與有因餘則全無成為因與有因之理也其和合性外道所計如與一法相系與第二法亦唯如是相系都無差別故彼和合性與此系屬並不相同系屬是火無則烟不生非烟無則火不生再者外道計和合性是離所和合法別有實體佛教所說之系屬是依所系法兩不相離假說系屬並無實體言因唯有有因者謂因皆有有因之宗即說因宗所隨無有無宗法之因也其唯火所有之烟亦能了解火之實等其火之光明與猛利等則非所了解故因唯有有因有因宗之外則無彼因無火則無烟故烟唯屬於火也頌說餘唯有因有餘仍指因法又如烟性是能了因其烟之灰相等亦是能了因其實性等則非能了寬故其外計之和合性則違反因與有因之系屬決定顛倒而住若謂因亦可為有因如所作性與無常性者曰許因之周遍彼分是有因能遍非能了如有角於牛雖亦有唯由少分成為因有因者然非以彼因遍彼宗之理成為因之支分不以此為因之條件喻如有角雖遍於牛非以彼能了解牛而以牛能了解彼能遍也何以故曰所破各無亂是觀待系屬故因於有因雖遍非作者所作性雖遍無常然由破其常性而能了解無常是無常雖遍所作然由破其非作而能了解所作由所作性遍無常義則非有非所作位故由無常於所作性破非所作成所了解非是能了攝頌所作遍壞滅非是非所作由所作義顯非遍於非常有角遍於牛遮於非有角如有角遍牛非遮遣牛義是中間二頌此二頌信慧譯為作性遍壞滅故非非所作遍故所作義未說非無常有角遍於牛能遮非有角有角性遍牛非遮非牛義所作性因與無常宗寬狹相等亦能遮遣無常中有非所作性由所作性義非遍於非常非遍二字似有誤信慧譯為遍故所作義未說非無常由所作性遍於無常亦不顯非無常即說無常也第二頌末句兩譯都通由有角義寬既不遮牛義亦不能遣非牛義更須研究二破異執分五一破論軌所說論軌中說見無則不生義了知彼義即是比量此敘異計義下逐次破執若見無不生許唯自行相不說了知彼若說於餘者為如何於何若於所成義何須無不生見烟等火等了何餘所比法義有衆多了彼如何說若謂見無則不生許唯見無則不生者則不應說了知彼若謂此說了知彼亦說於餘者則如何說於何見均未說明也若謂於餘處見無則不生義者則當說見此若於所成義若增說義字由是所成立時故見所成立何義即許彼是比量者如是則何須無不生謂前說無則不生後亦有彼前說見無則不生義後了知彼比度彼故意謂前後不須都說也見烟等火等了餘何所比所比度性除於火等見烟等譬喻外復說余何所比義由無則不生而了知彼耶法義有衆多了彼如何說法之義既有衆多何者是烟所了分烟亦由何分令其顯了皆未宣說也二破正理派執諸正理派者說彼前行之比量有三種謂具前者具餘者見總者亦可譯為前者相應餘者相應見總者此敘外計下逐次破系屬非根取此說具前者皆有故非如錯亂故非具具餘亦或如由餘繫不知非由於具餘由餘繫不知見總亦如是不得其餘果若因智是量差別亦不成此中且說現量前行不應正理何以故曰繫屬非根取謂因與有因之繫屬非根識境因與有因亦非現量如何能說彼前行者是為比量言具前者為由與前相應言如前者成為如聲或謂此中由有前法故說具彼而成具聲彼有何過曰皆有故非如謂如比量能緣系屬而領受後時之因亦能緣所比也亦不應說如彼一法前行由餘系屬亦能緣謂此如前者也由彼未見故未見之比量不應說如聲錯亂故非具若謂能具者說前者於此有謂果能具前因者則知彼境之智亦應成具前者於因了知果如是錯亂故非是能量即使有因亦容有障礙故餘因容未會故亦不生果如是且說具前者不應道理具餘亦或如謂或如餘若如彼者則與後現量其境相同之識亦應如餘彼亦錯亂故非是能量唯色相同非決定有味亦相同如是言如餘之如聲亦不應說由餘繫不知非由於具餘若由因具餘果故為具餘者則彼之智亦應成具餘如是若未取果則不能取無則不生之系而比度其因者然亦見彼如是由所作等亦應不能比度無常如前所說諸比量應不能了達系屬應說由餘系不知以未見後者故應以因等之系屬能比度果等行相之識生以唯由系屬門能生因與有因之智及一切種一切體性皆是因果種如是具前與具餘者皆不應理見總亦如是此亦是由因果之繫屬比度極不現境故此謂如具前具餘皆有過失見總之比量亦如是有過以是由因果繫屬比度極不現境故若一切比量智是能量者則於所量不得其餘果因無果是量不應道理以作者與所作業是有果故若因智是量者此意謂因智是能量比智是量果此亦非理彼非由異境於餘境為能量於餘境為量果此事非有如前已說若因智是能量者差別亦不成前說比量有具前者與具餘者此等有因之差別不得成立以因為境故諸說唯具前比量成為三種緣三世境故此決定詞唯字不應道理一切比量皆於三世境轉以說三世者故言如者品未說繫屬分為三種不應道理如是比量即亦破除正理派之三種比量即以前因比後果以後果比前因以因果比不現事若計比智為能量則無量果若計因智為能量則二智異境皆成過失三破勝論派執諸勝論者說此是此之果因繫屬集於一義及相違者彼等皆從因生此敘外計下破於因果破無相應知無成具二故非異火與烟相應非由於少分烟一切能了火別成所了合等亦如是相違亦有故因餘總非因別亦非有因如餘則一切成能了所了是為攝頌縱觀處與時不能了知因系屬無別故餘有故非二相違則非因無繫非因覺說從因生故非說皆是因成立有系念果等經未表最後非能顯無義餘亦成初句於因果破無釋中為從因果無成信慧譯為因果已破故此是說如前破正理派具前具餘之比量時所說之理亦破此中所說之因果比量也彼說系屬有二謂相應與和合此復如火與烟及牛與角也此中且說相應不成相應知無成即不知相應唯由憶念無則不生之關係亦能見故信慧譯為非具知成故謂非相應以不知相應亦能成知故於了知火若不取繫屬顯示所量之因由不應道理唯由知因能了知故若謂相應是比度之因者則火亦應成烟智之因具二故以相應俱與火烟二者相應故二者俱應成為能顯若謂於熱鐵丸與紅火炭位亦見有無烟之火若有一例外即不成正因以說猶豫即非因由此例外故火非能比之因故火非必與烟相應烟則必與火相應彼亦非理何以故非異故以彼相應非有差異如於一法於第二法亦如是故相應既能以烟比火則亦應以火比烟相應無異故若一非因火不為因比烟不應道理若不取同時系屬則由何觀察不正因之錯亂若如無則不生之系屬者則非二俱為因唯一是因極應道理又火與烟相應非由於少分烟一切能了火別成所了初句釋中為火相應之烟此說火與之繫屬是相應者即以烟比火應非由少分比度應烟之一切分皆是能比度乃至烟之實性等亦應是能了之因以無非相應故又火之猛烈明顯等差別亦應皆成所了之宗一切本性皆是相應故如相應有過失合等亦如是謂計和合為繫屬亦有過失牛與有角亦非能比所比或黃牛等別相亦應是所比有角之總等亦應是能比也如是集於一義亦不應理如和合說如集於一體之頭足等並非能比所比也相違亦有故謂計相違比量亦有彼過失如何有耶曰即不現成之四大種亦應說因與有因能比所比如是已現成之別與總亦應說互為因與有因以彼等部分未有不相違者故又攝頌曰因餘總非因別亦非有因如餘則一切成能了所了此結上來所說義謂因如烟其餘總如計烟之實性德性等非是能比之因其所比宗之差別如火之猛烈熱等非是所比有因若如餘勝論所計則一切因果等法皆應成為能了之因與所了之有因無差別故又若相應是能比之因者則應唯由相應便能了解所比以餘無了知因與有因之功能故於和合等亦應如是說若謂此中非是以烟唯成立火有以彼已成故應顯凡有烟處彼火相應若不爾者言此中者則無義故如是亦不應說火亦比烟或亦火之猛烈等者若如是者應宗一分為因也按理門論中先外問云如以烟立火或以火立觸其義云何論主答曰今於此中非以成立火觸為宗但為成立此相應物若不爾者依烟立火依火立觸應成宗義一分為因又於此中非欲成立火觸有性共知有故是故因與有因決定非由相應唯由無則不生故縱觀處與時彼觀待處亦唯是無則不生謂先於地方見無火則烟不生故觀待時亦爾如鉆木位若時無火則爾時不生烟故是故以烟比火之因相應非有和合亦非比度牛有角之因非現見事故縱有系屬亦不能了知因未見系屬不許為能顯縱有和合然了達者是唯由見無則不生故故唯此是因外計集於一義亦有二種謂果與餘果因與餘因此亦喻如色與觸手與足等對此亦應如是說縱有繫屬不能了知因集於一義者任於何處都不現見也縱有集於一義然了達者是唯由見無則不生故此亦如以色比觸觸亦應能顯色系屬無別故由集於一義性無有差別如由一說其錯亂則由繫屬亦應非因也諸說集於一處唯有二者餘有故非二見因亦從因集於一義果亦於果了知如說未現大種及從未現故說集於一義唯有二種說決定詞不應道理外說相違有四種謂現見與不現見如是等曰此等一切相違則非因如云風和合與降雨相違此中降雨非因然彼是無不降雨與云風和合相違非有如是餘亦應說若謂因以了達為先故未現前等之了達則說非因曰彼非是因無繫非因覺無繫屬故非是因覺以於因覺全無有因系屬太過失故為系屬義經說此是此之因此唯說因不應道理何以故以說從因生故所比之智亦應非果若從因生亦是因者則所比智應非是果唯從說因之念亦應能了解憶念其因即應了解其宗是故觀待憶念之因智是從因生非即是因若謂由是因能生因故說為因能了因者謂於此因之差別是此宗法能生因之差別作為因能了因名故如是說者曰彼亦非理何以故此中非說皆是因非說一切能生因皆是能了因此中作者及一切能生非皆是因能了以比量亦從彼言說生也若不爾者此中亦應說我及和合等以外計我等皆是能生因故因智非比量之親因以有念間隔故以是親因非有所言因以了達為先故此中成立有繫念非成立有繫屬之了達如說未成立即非因也外計因以了達為先其憶念繫屬在因智之後故比量之親因是念非因智更非彼了達也若謂唯一繫屬是比量之因者如是則唯是論中所說果等經未表此說若唯以繫屬為比量之因則果等應非比量之因經應未說果等唯是論中所說也若諸論中說云因性果性變易性故如是說云於有非是因故說為無常性與常性之因能了非經所表則由彼等中果等隨一皆非有也若謂如何非有其所顯能顯即因果事者曰若許唯能顯為因者則最後非能顯因之最後謂相應等應非能顯以異於因故復次無義餘亦成以餘繫屬亦能了解彼義故則說此是此之能顯謂意識了達為彼比量之因都無意義故勝論派之比量且難以成立也四破數論派所說諸數論者說且從一系屬現量增上成就者是為比量其系屬有七種彼等隨一現量義增上義非現量決定成就之因是為比量因智少有不定不如其義為簡別故轉趣後者從現量之總中由顯其未決定之別義而生起差別了解一切皆是比量此即外計下逐漸破若如是計說從一現量不應道理何以故唯觀自義故未知達彼故無別非住二彼無因有因不說別從異隨行非他故非他則非五假使最勝分亦非能生性異亦非所生從彼普得故最勝等一等諸異隨行等由何而攝持故此非能顯如是財有財亦皆非能顯餘繫表彼故正說為無繫唯財有財等是取有因者除繫餘亦知應一切能取能顯所顯事是一則非七非比許是念指定則非理復說頌曰說七種繫屬唯二種比量前行比量三此等何所攝無果故非因餘繫屬非應當說有觀察有亦有觀故由餘亦成立達頂髻義一異名言非有不知士夫義謂現量唯觀自義故以牛等之總別俱無耳等轉故現量唯緣自相若言許者亦非爾一切耳等轉皆非現量非如其義故若謂此於現量之果說名現量言從一現量者此中是說現量之果意之轉趣為現量則彼之境亦成現量故無過失曰此亦非理現量唯觀自義故若現量俱以總別為境者則應說緣彼境之意轉亦是現量然於餘境為量於余境為果無如是事前已廣說於餘境界立現量名言亦不應理其言一有系屬現量為由何行相門而說若謂由財等者非爾彼與有財相繫屬故財與財主有系屬故財等隨生之念則應無義若由餘行相者未宣說也若謂緣因相同者非爾若以不緣有繫故要先取所比上所有之因烟等後方念彼無火等則不生也如說從財與有財等一繫屬增上成就是為比量者不應道理何以故曰不知達彼故即不了知財與有財等由了知無則不生即能了解決定彼宗義故若未緣系屬則非比量之因唯有前智乃是彼能知之因故若謂一切決定觀待財有財者非有此不錯亂故當從繫屬比度也見繫屬已說是不錯亂之比量亦不應理應唯彼即成能顯故若繫屬是比量之因者應唯由彼相便了知所比若不爾者因應無有能知之功能故此中又應以火比烟以繫屬無別故系屬於火於烟都無差別既能以烟比火故亦應以火比烟也無則不生於火與烟等則無彼繫屬之過失何以故曰彼非住二故唯烟是無火則不生非火是無烟則不生故無彼過如是且說縱有彼等繫屬亦是因能害所害之事唯不繫屬何以故曰彼無因有因其能害所害如鼬與蛇彼等非因與有因即使蛇勝鼬敗亦無相違如是余亦應知所言能比因之繫屬唯是彼等作決定詞試問若時以隨行諸異了解最勝等有性等爾時由何繫屬而了解耶若謂是因與有因者此當觀察為是能生所生抑是能顯所顯耶若如初者則隨行非有以有因是異性即三十三諦因是最勝不說別從異不說從異別有隨行為因也不應說離異之外別有隨行為比知最勝等之因也若謂無過隨行非他故隨行非離異是他者曰非他則非五若不說隨行待異是他者則不得成為相應等五種系屬以彼等無異故假使最勝分亦非能生性異亦非能生從彼普得故謂能生所生事之系屬非由最勝等分唯由有性等亦應能了達諸異也從彼普得故似說從隨行為因應普得能生所生也最勝等一等諸異隨行等由何而攝持故此非能顯最勝等之一性等是由諸異之隨行等而攝持了知故非以此能生所生之系屬而為顯了何以故以由諸異之隨行體量等能了知最勝與士夫神我由彼即成立頂髻者之十義故彼即能了達最勝有性等之因非能生所生事也如最勝有性等與隨行等隨順成立如是財有財亦皆非能顯餘系表彼故正說為無系由餘系屬一分成為因與有因非由財與有財等以一切種應成為能取所取故財等任由何分皆不見為能顯故由餘系而說其義復次唯財有財等能取有因者除系餘亦知應一切能取若由財分能顯有財了解有因者則舍由系屬門緣取而由餘因非能詮說財義否則極超出者亦應由一切體性而能取有因也如是且說最勝與隨行等非是因與有因之能生所生事也能顯所顯事是一則非七若是能顯所顯事者則從財有財等異不應分為七種若唯彼一種是能顯則諸餘者應皆非能顯以與因有因異故餘系屬可得者應成此之能顯故餘能比之因皆無意義如前已說亦不說是因與有因之事何以故唯能比之因是能顯非是有因以有因是所顯故又謂同行事之繫屬謂最勝等與隨行等是一則非七亦以此答之若唯彼一同行是無則不生者則財與有財等非同行故應非比量也若謂由同行事有具餘比量者不爾彼如何了知諸超根義是故如是繫屬非比量之因又說比量有二種謂見別與見總曰其中非比許是念且不許見別者為比量何以故許彼是念故以捨憶先所領受之念繫識不謂此即是彼故非比量又謂見總有二種此中隨一或二指定則非理為如何指定若謂唯見總有二種者則由因果等應無數數比度若謂見總唯有二種者則財與有財同行能害所害等系屬彼等初起應非比量以彼等非因果初起亦非取別故復說頌曰說七種繫屬唯二種比量前行比量三此等何所攝若謂財主是作者因財是所作果以是能取所取性故者非爾應無餘繫屬故若許一切皆是能知所知者以皆是能饒益故則不決定說云此等二種以無果故言見總有二種何是此語之果若謂於餘亦有二種者則應有多種也又說具前比量是有錯亂者亦不應理以諸有繫屬者無錯亂故由於因容有障礙等亦可無果故由錯亂故非是比量若謂由是能比之因故假說因為比量者亦不應理何以故若錯亂者則非因故不能由彼比知彼義則非彼義之因是生疑之因故故於此中假說為比量亦不應理若謂於因雖容生果智由了知因錯亂故信慧譯為由不知因錯亂故說為錯亂者彼亦非爾以爾時非彼之因故若時於彼生不如義之過失爾時即非彼之比量若雖不具因與果智要依賴不錯亂者則餘繫屬非應如是觀待不錯亂者彼唯無則不生故彼是比量之因非與果繫屬若謂有觀慧者之唯具餘乃是比量餘唯於因能了假說為比量者如是則彼之一切比量皆應說有觀察若謂現量雖亦取總然於義之差別不決定故非唯具餘者乃有觀察有亦有觀故即有因成立者亦可觀察此由此成或不成故如江河充滿是不錯亂雖有觀察然非由能作所作是由無則不生故若謂唯由此具餘見總比量能正了知超根境者此不應理何以故曰由餘亦成立若時即由隨行等能數數了達最勝有性等爾時由見差別亦見能了知故故指定非理也不應指定唯由具餘見總比量也復次達頂髻義一由具餘比量之支分了達最勝一有性亦應正理以彼事性即是因故若謂由異了達彼義不應理者曰不爾以從彼之隨行等相異性即是果故異名言非有若謂非離異法別有隨行等即由隨行等成立最勝一性等故則具餘之因復何所了解耶如是則不應說相應有五種頂髻者亦非有十義也復次不知士夫義士夫神我之有性或多性或異或不異等此一切種比量皆不能知以士夫非因故如是應知諸數論者之比量不應道理數論所說七種繫屬一財與有財事如王與奴如最勝與神我二自性與轉變事如酪與乳如自性與大等三果與因事如車與支如薩埵等轉變為聲等四因相與有因相事如陶師與瓶如神我與最勝轉五支與有支事如枝等與樹如聲等與大種六俱行事如鴛鴦如薩埵等七所害與能害事如蛇與鼬如支與有支之薩埵等每條二喻一是世間喻二是論中喻五種相應未見明文尚待研究頂髻十義一有性二一性三有義性四他義性即為他所用五他性六非作者七合八離九多士夫十住上文信慧譯為若謂無因果智是觀待錯亂不錯亂者不得餘繫屬如是則若時唯待不錯亂爾時則是說唯無則不生是比量之因非因果之繫屬也於具餘者亦非於比量有觀察乃於因也若謂於因假說比量者如是亦言由總亦現量與決定彼中是說一切比量皆有觀察故非唯具餘者方有觀察也於有是此觀於有因亦當觀為成不成喻如江河是水充滿然非無錯亂若謂唯此具餘見總比量是了達超根事之因者彼決定詞亦不應理由餘亦成一若時以隨行等數數了達最勝有性等爾時由見差別亦見了達故故決定詞不應道理復次彼能達散義頂髻義此譯為散義謂由具餘比量當能了達最勝唯一有性以彼有性即是因故彼亦唯由差別了達應理非由彼之隨行等唯諸差別是果故非說即差別若謂離於諸差別隨行等及最勝一性等非他者若如是者則具餘之因當說何所了達以是不應說差別五共及零散十義也復次都不達士夫士夫之有性或多性或異或不異具餘比量皆不了知士夫非因故五破觀行派所說諸觀行者說比量等以現量為前行故與彼相同故經未說諸作釋者隨順語者之意樂廣為分別此敘外計下逐次破現量前行故比等經未說則念欲及瞋勤等應是量釋者從餘書摘出集一處宣說比量等非現量前行具境無根覺於境彼非有具非比量因有具由自體非是能了達非餘亦非現於何破比等如是亦破彼義二種一定比量餘虛妄黑者家中無非表於外有然由家聲義了知此外有其中言現量前行故比等經未說則念欲及瞋勤等應是量若謂由有現量前行已知彼是量故造語者未說比量等若如是者則憶念等亦應成餘量以是有現量前行故若是釋者從餘書摘出集一處宣說比量等非現量前行言有現量前行者若於繫屬或相應等說為現量者如有繫屬或二者不應道理具境無根覺於境彼非有諸根是緣不共境者如前已說繫屬依於多法如何成無分別根覺之境有繫屬者亦要取繫屬性方為比量等所需現量則非如是諸作釋者多說差別比量以說見總不見等故其中和合集於一義相違及彼相應等皆非現量以彼許有相應之有繫屬者為現量故告如是許曰具非比量因具相應非火與烟等比量是二者之因無差別故應了知一切前已說訖有具由自體非是能了達有具者由自體於任何比量都不能饒益非餘亦非現如彼了達不能饒益比量如是現量等亦爾如前已說此中不應宣說破除比量隨教聲量稱量喻量等何以故曰於何破比等如是亦破彼此中未少成立自許比量等以未顯示餘繫屬故此中少有所說皆是勝論所許故如破彼當知亦破此當說破除義解及無事解且破義解義二種一定比量餘虛妄謂以義了解有二種一一向決定二非一向決定其一向決定者即是比量一向決定了解者如由煮熟了知同器等食亦熟彼由煮熟之因能了知故不異比量餘虛妄者謂非一向決定之義了解者非是定量是疑因故如云勤勇所發故無常若說非勤勇所發故常者即不決定二破無事了解如有說云黑者不在家即表在外是無事量曰黑者家中無不表於外有然由家聲義了知此外有此言黑者家中無由家聲之結合以義了知黑者在外非是由無了知也若家與外俱無者應唯說無故以義了知在外非餘無事量能治品不成說品為成就有說由破他品應許成立自品者應知以此遣除亦遣除也已說自義比量
