body:
  text: 觀遣他品前說量有二種有許聲起亦是量者即所謂聲量謂由發語聲為因了達其所說義故名聲量聲起非離比而是其他量由遣他門顯自義如所作聲於何境由無則不生之系屬即由此分如所作性等由遮餘義而顯示自義故非異比量說聲量亦是比量所攝有說種類之聲是從各自差別而成為於所說起決定故是差別聲答彼頌曰諸異無類聲無邊故亂故聲謂能詮且如有等種類聲非是實等之能詮以無邊故言無邊者謂諸異法不能與聲系屬無系屬之聲詮義亦非理僅能了知聲自體性如聞異方之言僅聞其聲不能了解其所詮義又錯亂故如有聲既於實轉如是亦於德等轉實是有德等亦是有故有聲於實等皆轉有錯亂故當成疑惑非是能詮有作是思唯種類聲或唯具彼者易系屬故不錯亂故答曰彼等亦種類或具聲非別詮異義如是言有實有德有業其異義之實等聲應不成為共同所依然如是見若有或具彼於實或德皆不能有當說為實之有也意謂有等種類聲非即實德等應說為實德等之有用第六轉聲又攝頌曰功德與有德說別定異故同所依之實及聲皆極成繫屬由有繫法所引而說如是由所作說事非由餘系屬非決定能相繫屬容有餘障碍故要由有繫法方說為繫屬故非由自法能說繫屬聲以此為例由此種類聲詮說不應理有說與諸異聲同所依故易系屬故不錯亂故當說唯具種類彼亦非理無自在非具若如是者則實自性當由有聲差別而說為實非直言實由彼不引瓶等異法故則彼於諸異性非有共同所依無與非所作非有共同所依如白與聲於說自德由實差別而說故由有不於實引甘美等如是此中亦應成異又曰假設非有故假設故者謂聲詮自體或種類假立於彼轉及具有彼若何於何所假立義即說彼為非真實義相曰亦非有故言具彼者為由功德相同而智轉移此同非有為由功德饒益相同亦非有故如何智轉移非有以假立者如說民為王覺相各異故如云彼人即我自己於奴僕說自聲者非於王與奴生相同之覺於具彼假立種類聲者亦有次第而說者如花螺等白於何智相同者現見次第而說譬如說君陀花俱穆陀花及螺具之白色其頓說者如具彼種類之聲非有智轉移之念於德所益事無覺亦應轉若如功德所益之玻璃而具彼功德事者則於實轉之覺應不待於功德轉之覺如紅玻璃覺之事不待所依諸未熟悉之人都無異覺故又雜相於一切皆應成倒智一切聲智由與義合雜皆成錯亂猶如玻璃則一切知皆非如義復次總等與多性及諸頓緣者饒益應相違諸能緣眾多者如白等功德譬如說瓶地造實苦甘香等爾時功德饒益則應相違爾時由功德相不能與實成一無差別故於一境上亦不能由功德相而領受也若謂一次即能了達瓶等事者破曰見瑪瑙眾色若謂一切皆是瓶故故能同於一時各各皆能饒益於瓶等事無所取故其見瑪瑙一切雜色者是頓得一切事也彼等諸異法具彼過相同類性或具性由何不相合對於異體亦決定應說謂說種類為異體及於事類假立為異如為具彼所說過失一切應說以於所說種類亦可增益聲自性說為實故由是說具種類及種類性等此中亦當說如何有過說具彼為異彼如前已遣於種類聲言已遣者謂前說諸異無類聲及說於具種類亦應說若謂種類者唯由具種類而說非由異法自性而說者若如是者唯具彼應觀為繫或是有言唯具彼者具彼亦當成事緣或系屬功德如說攝略作用益他等說為系屬由他共稱異事無亂為系屬故對彼亦如前已說種類或具聲非別詮異義瓶等具彼義若衣等不轉彼總義如何總是於多法俱轉者於具總之瓶等豈有衣等轉耶彼等之總為如何耶若謂說具總者其增益為彼總之義復為何若立有聲是詮總之言其有等上無復有等故不應說於彼轉是故若決定許有總義者彼亦於義非有故曰唯聲義相同具彼之瓶等是有聲所詮故具彼與有相合者前無少極成許彼無因緣於諸異聲不見不異之因緣故彼亦不應說是總如是諸所別亦非有若謂由有聲於不異有功德之實轉者如極青等亦許於瓶等轉故成為能別與所別者破曰若一如青等非爾縱然許類無類故非應成為所系之功德亦非如是以青之聲無極青等由餘具彼不應道理說青系屬非是聲義復次縱然許彼總由於種類更無種類故亦非總縱許有總然於青等亦非有如青總所分三類之青等功德諸許具彼瓶等種類之差別故則許於實轉之瓶等之差別故此亦不應觀察如是於聲雖非所詮然由義引當許瓶等為其差別則瓶等具彼之義定無少許聯繫義引不決定言由義所引者謂由義之勢決定生起如云晝間不食則決定夜中而食此中言有不定為瓶等故是猶豫因非有義引故云種類聲是與異系屬之總具種類之能詮不成任何解答也故聲亦遣他故如前說如所作性等聲亦是由遣他門而顯自義又曰所詮雖眾多聲非皆能了與自隨繫義是遮遣之果聲亦非能於眾多法義轉唯於所結合非由聲德等是諸攝頌若唯遣他是聲義者如青蓮等者如何成為共同所依及能別所別事耶云何不成如總異者是諸差別聲之遣他故非有彼過遣異義別故了自義異愚一無異果故能別與所別若依青蓮等聲亦由遣他之別而遣除自義之差別故如竪立與鳥落等聚於一遣他自義而成為共同所依如是彼等各各於各自之差別成猶豫因非由具餘聲成能遣故由有如是事故亦成為能別所別謂如一所依彼既非青亦非是蓮如何既是青亦是蓮茲當說彼非唯是青亦非唯是蓮聚是所詮故由青與蓮聲與彼一切結合非單一種若單一者如顏色無義信慧本為如字應無義如雖有尼聲與羅聲然誦尼羅都無有義此亦如是若謂說顏色時其尼羅聲不生少分義解為斷此攻難曰顏色無少義然由彼二語能了彼所詮彼亦了單義如尼聲與羅聲為尼羅聲所空如是蓮與青聲亦為聚聲所空如說尼與羅聲不生少分義解者對彼亦應說種類青是尼聲之所詮當了解單獨義若具彼功德之所詮者亦是具實之具如顏色為義所空如是聚義亦是彼名言所了也若是異聲宣說由義之勢即是宣說異義是故遣他之聲義中共同所依及能別所別亦皆應理於餘義中則聲義非理何以故以於彼中支與有支之義與彼所依為異為不異耶且非不異應互成一故聚非有一性若聚是一者則蓮與青義應非異以一義中非是他故彼等亦應互成無異復次聚應成眾多以聚者不異多法故應成眾多由此義故亦非是有即許為有其聚與青蓮義亦非有共同所依以於一事轉者聲非捨身義若單獨義是青與蓮聲之義者則自與聚中由何能言彼等即此而成共同所依若謂無彼過失以總中攝別故彼二別義同一體性者是由總義為令了知具差別義故故合說二者之事如是二者即是共同所依以具聚義故曰此中且如青聲詮無異義非是種類青聲之總若不詮實與種類由何觀察攝入差別與實種類之中若謂如青其實亦為總所詮者信慧本為具青之實亦為總之所詮若有彼差別者則羅婆與鄔波羅等亦應為所攝也然如是非理何以故前已說故謂前破具彼種類時云無自在非具等等已說不成又說總中攝差別故亦不應理由何非理疑故非遣他見由總聲於差別聲生猶豫故由何生疑則以彼詮說不應正理若謂雖如是然由差別聲義即了知總無錯亂故應作是說於差別中亦攝其總此亦非所詮非遣他故謂青聲如鄔波羅等則青等非遣他故應說為攝入其中縱然許攝亦是攝入所詮之中若謂二者俱是差別義者則成異門之聲現見一應成異門異門之聲謂對不了解者及眾多義為令了解前義故更說餘異門也若如是者則成為異門聲之聲諸異門聲謂仍詮前義非頓時說如是即由青聲了解蓮義則亦非有能別所別此上且說不異品之過失如對不異所說過失於異品亦爾謂計異者離諸聚法別有一聚性為彼聚性於諸聚法抑諸聚法於彼聚性若一切轉或一分轉皆定非有即許為異異則亦非二彼中亦非有共同所依亦非有能別所別彼為義成一抑聲成一若義成一者為德實成一抑具彼成一如是若聲成一者為說德實成一抑說具彼成一當如是觀察其中義之實與德若於一轉者總別二非有若青功德與蓮之種類於一實轉故則共同所依與能別所別皆成非有青德非具蓮之種類蓮之種類亦非具青德具彼二亦無若時青德與蓮種類具總義者爾時則無共同所依於他轉之實中能別所別事或二者於一亦非是有以總別不相合故以上且說二者於義非有如二者於義如是聲應是唯說類與德若聲唯詮說種類與功德者極相異故彼亦非有彼等之共同所依亦非有未說系屬故彼聲亦非有能別性似是非有能別所別以上且說唯詮種類與功德不應道理於說具彼中應成同不同若種類與功德之聲詮一別實者故彼所依應成相同若詮異能別實者故應成不同由其不決定故無共同所依若謂同故不樂說若作是思且受共同所依是相同故不樂詮說者無系屬差別雖有系屬等差別然不樂詮說以且受共同所依相同故信慧作不樂說不同若於何處有同覺之因即說彼為共同所依其中雖有花未開放等諸餘差別非所樂說也此是無盡攻難俱遣二者而攝持等乃至幾時有義爾時於彼聲有作用即應樂宣說彼也若有系屬者非是所樂說之差別則如何宣說有事耶又曰牛馬等亦同若牛馬等亦由牛性有等系屬都無差別於彼不樂說總而說彼事如蓮與青等牛馬亦應成為共同所依若謂彼未差別者信慧本為彼是行相別若作是念牛與馬等有形相差別各各遣除種類之因有別如是各別宣說如何不樂說彼非如蓮與青如是亦非應成為共同所依也若如是者應成多聚集又所許亦無由於一事多總能顯故應以多形成為聚集然不見有是事又言同者謂牛與馬等未說所依同不同故牛性有等非是能顯其中若說同者應成共同所依信慧本為又同者謂牛與馬等應成所依同與不同以非所詮故及能顯有性等並牛性等故其中亦若不樂說不同應成共同所依言所許亦無者謂許為有共同所依者說蓮與實等為有彼亦應無得也若謂總是能顯別故牛與馬等無共所依者如是亦見蓮花之有及實等是能顯性復次德實應非顯功德與實非是形故則與彼系屬之總應非能顯若謂由功能差別能顯自共相故故於實等異法非有形狀差別曰不樂於諸異事亦許功能差別故如蓮花事若謂說總是顯異之因故者於彼當說何者是牛性與馬性等之差別此中當說何者且作為牛等能詮之聲彼等隨欲之聲各各聲之所詮即彼差別其中異由能詮異聲自無差別如是總別唯聲異者非彼自性若謂無差別事由差別聲假立為異者不應作是說以諸差別是能顯總之因故牛等差別應無故若謂如歌羅等由能詮異故者曰不爾彼應思擇故以於一法亦由多異門聲所詮說故此中是說如實聲自無差別於聲中如牛等雖亦自無差別然由總則作為差別於中即如是安立若謂現事豈非牛聲等之差別耶曰現事中縱有差別然彼非所詮非與義俱見故諸愚車等名言者不能說彼義故故由於總而於諸聲分其差別諸勝論者說諸總由自性有諸差別以依各自之總即是能顯此如云頭背腹手等由此等差別如彼所計能顯所顯異當得互相依言互相依者謂所說彼等當得也何為實自性謂能顯自總也何為總自性謂自實所顯也如是相依而說非能自顯其體也復次自性多與一互相顯應多言顯多者由是眾多之能顯及由眾多所顯以實是有等眾多總之能顯謂一總有多自性又言地所造等多實是有等之能顯謂諸有有多自性也此中於一切種由功德系屬各異故由功能各異故由能詮各異故雖是一事應許為眾多體性又曰由德能能詮別故設為異一多相繫故應成為眾多是中間頌以上且說共同所依非有能別與所別非自在前說如說具彼中能別所別非有彼前已說訖以是於遣他之聲義中共同所依與能別所依事皆悉應理非於餘相非他總與別應說為異門雖皆相同然非他性之總與能別所別異門諸聲義是遣他聲何以故無相違故且異門聲非頓合故雖同是遣他而各捨自義不應道理又諸總聲於自諸差別遣他義者非不重執諸差別聲是所求故謂如樺樹非拔羅沙等如是亦非瓶等此等是解答應捨餘非總聲義難如是總聲安立自所樂義境時如何不待能別所別之聲如是無違故積聚亦能詮餘義聚總等聲義仍是遣他無不應理如是總別諸聲於自義總轉故隨二或多於彼所差別之餘義亦能詮說極為應理如前已說又曰許爾許故異自總皆不捨不取於一義此等生疑同雖眾多取總由異不錯亂能別與所別彼等非相同是諸攝頌問由何因緣而能除遣餘異聲義異與諸餘異相違故能遣異義之聲謂諸與自為於總義得自在故互相違逆如諸王子故由餘義則相忍耐如說此是樺樹樺樹之聲由與樹同時相則遮擔木等樹而安立為自境如是於餘亦爾如是於餘亦爾如是且於異聲舍置一實故於餘差別聲義除遣非理若如瓶等不相繫屬之餘總異義如何除遣耶謂餘總諸異義自總等相違謂由樹聲於瓶等之為地所造得自在故是其相違故於彼所斷事如友之怨而生隨喜義亦知彼已斷除彼此等是說餘總之諸異如功德等及彼之差別色等諸有系屬及非系屬當知如友與友之怨是能除遣及能捨置其中彼非彼親遣如樺樹聲非親能遣瓶等何以故總非相同性若是親能遣者則與樹聲義應相同也如是與餘別彼非能除遣如以樹聲不除遣波羅沙樹名等如是樺樹聲亦應不能遣彼相同故若謂無過以能遣多少各異故者如是不應道理如樹與樺樹之聲各別詮說樹性與樺樹性之各別事故詮說極異義故如是此中亦成不相雜義言能遣多少者義亦應爾若謂能遣餘差別義者如何說此功德與餘功德共同所依如說甜味中潤性清涼及重性耶此不相違何以故若是同所依功德與餘德於一實轉故所依不相違於實有者則於甜味可設立潤性等功德由於一義和合性故無彼過失不見故亦遣又各異聲於餘異義由不見故亦即能遣何故不見謂於事義唯以我慢執以為足為破彼故如是總當遣自異若由不見便能遣者則言總聲於各自諸異法亦皆不見應成遣他餘非理見故言見者謂由時等總聲而見別也如是現彼疑若如是者則彼總聲於差別現理應生疑若謂若於彼等見先所見且於竪立者若謂疑應理信慧本為若謂疑非理作如是念若由時等及義勢同行可得者如何生疑耶彼單獨決定不應如是說言於具彼等生疑者謂於具義等決定事後時由單獨而生疑若異無單獨若謂總聲於諸差別不見單獨如說云種類之聲非諸異法之能詮曰待聞者則見謂諸聞者遣他總已而求單獨如問此樹為從地大生抑從五大生曰從地大生如彼決定者言於彼樹說從地大生之聲是從何生疑言彼決定從此單獨生疑由唯聞說從地大生有單獨量式故無過失如義是遣他如是總亦爾如此義遣餘義是為義總如是此聲能遣餘聲即是聲總遮遣餘聲已由聲總能詮如由所作性遮非所作以總了知無常等如是遮遣餘聲由聲總詮說非是於義於何義疑一於多義亦疑何處於何義等聲義疑為車支等即彼一聲於多義亦生疑如於拔瓦等聲亦疑為有性等然由聞者於彼總聲亦作別聲觀也又如說聲遣除餘義而詮自義如何無有前說過失曰不見餘聲義顯自義分故聲繫屬性易錯亂亦非有隨行與回返者由聲詮義門於彼等相同處則轉於彼不同處則不轉其中於相同處不說決定遍轉以於無邊義中容有一類未說故於不同處縱然是有於無邊處非能遍轉不說者唯由不見故不同者雖有無邊然由不見故能說不轉也故除與自相繫屬者餘不見故遮彼之比量即能詮自義也若由隨行門比度一事如樹聲於樺樹等現相生疑如是從地大生於非實等現相亦應生疑若彼樹聲於非地大生等不見故由彼返性而能比度又曰樹地生及實有所量逆次四三二一疑餘是決定因是中間頌見附表除有繫屬外餘聲或因性非能詮義以於多義不能一切皆詮說故然於自義亦非錯亂以各異詮說故如是且無前過彼非有云何附總別關係表別望總決定總望別不定如樺樹必是樹樹必屬地大地必屬實攝實必是有有法不定是實如德業等實法不定是地如水火等地不定是樹如瓶衣等樹亦不定是樺樹如榆柳等餘亦類知破餘周遍故彼異義非異由其總聲遣除餘義而不引自之差別故與異聲屬同所依可應道理故無與異義差別義聲異之過失彼說同聲與遣他義之義二俱是聲之所詮也如是於自義不錯亂以單獨者非於他轉故亦無後過失如何親轉無異故非取他義之聲於各自諸異義轉故無由他自在不引異法之過失其異無窮故非能遍故非是能詮故亦無總過失唯遣他義非各異故非是實故亦爾是故此中不應尋求總具餘差別以是親障餘義故如是由無前說過故唯遣他義許為聲義最為端嚴由何知然諸類法安住言諸類法者謂當觀為一性常性周遍一切別法為相即安住此性以不異故所依不斷故了達一切義故如是由無所說過故有功德故說諸事之聲遮遣餘義為差別性若爾遣他由何定若謂色之聲遣除味等未增說顯色故雖已遣餘法然極相異彼如何遣若許諸不異色者則彼過非有青等即色味等非有故者無彼過失謂世許不應求世尊亦說於眾生名不應耽著於世間名亦不應棄捨是故吾等於有因緣者及普宣說者是隨世間名言不尋求真實義當如世間了解世間許色之聲於青等成就非於味等如是色應同又極異故彼色性為何於青等轉而非味等若於味等不轉亦應於黃等不轉若謂此中有因眼所取性與青等不異於味等無是由自性各異故者若爾者眼所取作用由眼取為所取名眼所取如是則由作用因緣於青等說色聲非由種類因緣也若眼所取性無異者為何是色若謂由與色性繫屬因緣說為眼所取者若爾則眼所取性或作用和合或顯現色性也眼所取總性亦由何決定決定應依事自性實等亦應爾實數量等亦是眼所取故則彼等亦應有色性復次非白等無別眼所取性無差別故應無青黃大青極青等差別是故即無眼所取世間共許於青黃等異法亦說色之聲非於味等由是遣他決定若謂不待遮他義能詮聲義若如是者應唯隨行成若如能詮聲義者則非許由隨行與逆返以定取餘差別及二俱說皆有果故說於逆品能詮義如說殊勝所作為業若謂若唯遣他是聲義者應唯逆返是能詮者曰若不許隨行者則應爾然由事品非親許周遍於諸事中或異或不異種類非有如前已說言未見餘聲義此時於無種類由遣他義所差別義聲隨行逆返是無他義有作是說如說牛等所遣由一切無轉變成一切體性故應從無成為有體也此中若有許一切與無繫屬者由何說何法有由多體性若如是許者謂一切皆與無繫屬彼中除有性所有餘牛等無增益為牛等有應許一切皆由隨行不應答言一切應無又有說云於無與有知不應異如知碗等皆屬泥性亦見自性知轉變故對彼曰若許由泥異碗等異覺者無離異非他何為破異覺如非離泥為他者應成唯爾許覺如何由表詮門許碗等覺異如是於無有覺異如何不許由聲自性異之力耶由泥異句信慧本為泥無別意謂泥與碗等無別由覺異故安立碗等為異如是無與有無別如何不許由覺異故安立有法為異耶即於汝數論宗諸德勝自性非屬所見道凡屬可見道皆如幻甚空雖有互差異然由見犎等彼覺喻相違是依汝宗義犎等信慧本等皆作胡等如從非牛返彼牛之覺是由見犎等因緣而說牛與犎等其聲各異雖異除遣然汝宗所許雖然相違猶決定說此無觀待知唯自分別化以非遣之聲不詮任何性於犎胡等無餘具總體性不觀待者則定非有如前已說自性非所詮故不應由彼門而異有說應無最初識對彼曰無始故樂成言最初識者唯屬非有以名言因果展轉相傳無始時故若無最初識者不能遍具種類亦不能從具種類返或不返非於一多轉當有彼諸過失有說識無真實轉對彼曰由總門除遣非有實物而能遣他猶如種類唯由總法於所遮境說為能遣此亦唯顯於異類處不見而為比度前已說訖汝宗亦犯此過若於同類遍轉者於所遍非有邊際是故如說以有角故非馬凡不見有角即隨所遮而比度故非各別遮黃馬等及各別轉趣牛等如汝計覺退返與隨轉此中亦如是應理也若許有餘我觀一性多性彼於事非理若我有實事者觀待一性多性皆不應理若不許有餘我者汝顯能亦爾若無實事彼觀察應理者汝之顯與功能亦應相同若諸功能之顯與不顯是一性者則應無顯之分別若是多性者離諸功能非是他故言最勝是一則成相違觀聲所詮義此非根行境若此聲等轉非各別諸根諸現量境無可顯示如無顯示者謂說無餘我即是餘我故此非現量轉此亦云若言詞所說假設為語義詮別現語義從彼初生起言詞所說已無實義零散者無能故如教所立語亦如是安立如自性與緣言教所立者諸餘教中不應理故此是安立餘義故受持詞義之方便是語義顯現初未串習之聲義繫屬語性與彼義直接於聲義中無差異故後由緣聲義之增上慢安立如無鈎制故若諸於各別所現義謂餘外義或彼所繫棄捨此已了達語義若如彼說亦唯是分別何以故如由串習語無義亦生心由自緣相屬各了多種相由觀待串習外義習氣之語如能作義而生了解如說常等及彼無別雖無外義由與自緣相屬能生種種分別如聞愛情詩詞諸有貪者則起隨順貪心諸離欲者則起隨順厭心彼由餘語義許為所遮義知繫屬語義非異於比量如實各別現亦是異於他語由了知繫屬而生故非異於比量即是比量攝若何從何生種種分別識彼亦是自證非異於現量分別是自證故即是現量不應分為餘量若問諸有原因之聲可由遣除餘義而詮聲義諸隨欲聲又如何耶曰隨欲由義別隨欲聲中如帝答塔果等聲是淫說總即由彼總之差別而說若問種類與總聚諸聲有何差別曰無少差別種類之聲由共許力有者於各別支分而假立如云不應食聚落之猪說猪肉為猪有者親詮說如有不觀待數量形而轉如水等諸滴聚合而詮說有者非唯於支分而轉如由形顯分差別而詮轉聲於彼支分不見能詮轉形狀差別者如說輪圓長方非唯以支分而說如是拳結鬘耳嚴等亦爾顯色差別者如雜色花墊等有支之差別如百千升斗月年兩等非於諸支分轉聚集之聲亦有於各別事圓滿聲轉如云去來等有者假立如以身業說為我業有者不轉不於支分轉如云水云林等若問有者不作繫屬顯示聲義如云波那薩果信慧作此波那薩應有此字於彼如何比度耶曰彼非由波那薩果聲乃知其義何以故顯所達義故是由言此之聲與手指示或舊名稱相繫屬了解彼義非由波那薩果聲了解彼義謂於彼名所顯示之義是名義與言此之聲共同所依是二者所詮非是為彼而作名義若爾與波那薩果相繫屬應是聲之所量曰非繫假立故繫屬者謂波那薩果之義與聲由他量緣已謂此即是此此果即此名或此名即此果了知與波那薩果相繫屬以與所量相繫屬故而為比量是故聲量非是餘量餘比喻量等云何非他量曰此方亦說餘且比喻量如為了解黃牛與青牛相同故或從他聞而解即是聲量或自了解謂先以餘量了解二聲義次以意了解彼相同故彼亦非是餘量如是思維由是比知與彼相同故應了知非餘量以非比量分別之外故是遣他
