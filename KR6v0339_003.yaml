body:
  text: 他義比量品分二一正説二分別今一正説他義比量者善顯自見義如自由三相因生有因智如是為令他生有因智故説三相因是名他義比量是因立果名故此中未説任何一相亦是不完全説二分別分二一辨所立二辨能立初又分二敘自宗破異執今敘自宗其顯所比者許為因義境唯説自體性自所樂不遣現義及比量信許於自依或曰顯所比者是為立宗因明論中所立他義比量其義云何曰唯應問彼吾等説所比者是許為因義之境諸支分中其説為所比吾等不許為能立以彼生猶豫故然為因義顯彼境故彼亦定當成立彼復唯説自體性隨自所樂言唯説自體性者謂是所成立之體性即尚未極成者非成立已極成之體性如是亦離不極成因及相似喻以不説彼等是所應成立之體性故言隨自所樂者是顯觀待自論所許即不顧他論即自論中亦隨所樂而立非立一切也此復須不遣謂於自所依有法不為現量義比量信解共許所遣隨所樂成立法所差別之有法於彼上與所立法相違之現量比量自教及共許等所不遣也此顯所立無諸過失若非如是即是似宗如説聲不可聞瓶是常等如説正量不能成立所量義者唯宗相違又若於中由不共故無有比量為極成言相違義遣如説懷兔非月有故此等唯説法自性遣門由此方隅當知亦表法與有法差別自性遣如有支非離支別有以離低昂無別稱故支亦非離有支別有應非現見故實應非有以功德之實應非實故二者之自性差別如説一切語義皆虛妄如是雖有言説若言説與語性即虛妄者則彼語性與虛妄性二俱除遣如是遣除二者自性若謂不遣所説體性虛妄者如是則遣二者差別此段文尚須研究一切言是有法皆是妄是法其説者之言若是妄則直接否定其法與有法之自性若謂説者之語不妄餘一切言皆妄者餘一切言是有法之差別彼言之妄性是法之差別其説一切言皆妄者自語則妄反顯餘語非妄故與二者之差別相違也破異執分三甲破正理派乙破論軌丙重破正理派今甲破正理派諸正理派説謂顯示所立義顯不成者其不成因喻亦應成所立若法是所立則無有同法有法是所立則因全無義前定詞無義後則非所樂謂顯示所立義顯不成者由言所立即顯非已極成安住非所立之差別破曰若如是者則不極成之因喻亦應成為所立也如説聲常是所觸故如覺如是如云是眼所取故無常此中亦説所立故應成為宗此復應問為説法是所立抑有法是所立為説二是所立耶此有何過若法是所立則無有同法若唯無常法是所立者則不能説所立法之同法以無常性無同法喻故有法是所立則因全無義若謂有法為所立者聲極成故不應更舉成立所立之因也若謂二者俱是所立者則俱犯二過此復為云唯顯所立者為宗將指定詞加於前耶抑云顯於所立者唯宗將指定詞加於後耶此有何過曰前定詞無義後則非所樂若謂唯顯所立將指定詞加於前者則顯能立已引出因等其指定詞全無意義若謂顯示所立唯為宗將指定詞加於後者則為因喻而説亦應是宗其宗義非理乙例破論軌對論軌者説如是説所立宗性故非有觀察此所樂唯返所不樂對於説所立為宗者如為正理派所説過失論軌中亦爾以所當立之因及所説似喻亦應成宗也彼若謂宗性故非有者釋中為增宗故非有意謂非但言所立其上增一宗字則非有彼過論軌者説非唯言所立便成為宗謂宗所立宗字顯所樂觀義由彼是宗故無其唯所立則不極成之因等亦應成宗之過失也如何無過則此觀察所樂唯返所不樂以彼唯返所不樂事如何能了所立差別所樂觀察者如眼所取亦能觀察此是因非因故亦應説彼為宗也如是已説宗與似宗丙重破正理派對正理派説由宗與因違謂宗過非理諸未善學者説彼異法喻此非以其因量度其所立非相違相應正理派者説若宗與因相違名宗違過是宗過失如説聲常一切皆無常故由宗與因違謂宗過非理此中言宗與因相違及是宗過俱不應理以是諸未善學者説彼異法喻諸説此因式為宗違者不應道理此是以異法喻方便而説也如是立量為妙聲常一切皆是無常故此義説由非一切則無有故如是以異法喻顯無所立則無因法此非以其因量度其所立言量度者此中於聲言是一切故非説非一切為因以彼為因則不極成聲亦攝在一切中故或是宗之一分故若言一切皆無常中其一切之聲亦説聲者如是則聲亦攝在一切之中故非一切性則非有云何非有若時此是一分故非一切若爾餘亦是一分亦是非一切如是非一切應非所樂也若謂如是亦應成宗過以無常性即遣常性故非遣聲有性故由説聲有故是異法喻量式若謂離聲餘為一切故聲非一切者此亦是宗一分義故為因不成如云無常以無常故如言聲是不成義如是言一切非有故因亦爾若謂如云諸積聚者必為他用是積聚故又如云有為無常是有為故現見彼等亦以宗一分義為因也曰彼非以一切積聚法及有為法為宗義以無喻故然是以眼等及有為法一分為宗也若謂聲亦應成為不共曰彼無成為不共之功能以宗義之法為不共者所聞性是不共應理以於聲上更無餘聲故此義不成名因過失喻亦有過非是宗過論軌説此攝在相違似因中然如是相非相違相應彼説二種相違一宗義相違二宗派相違彼二俱非有此當説彼二亦非相違二辨能立分二明宗法正明因初又分二甲正明宗法乙釋伏難今甲正明宗法所有因似因多屬於宗法故於因等義先廣顯宗法宗法於同品謂有非有俱於異品各三有非有及二總是所立故法有法單獨雖非真所立是彼一分故假説名所立由彼俱成法而得名言故若俱或隨一相反或猶豫法成非所許不許皆能破若俱極成者能破或能立餘者許重成有法非能成有法及於法法亦非有法法成法成故有法亦如是如是已説所立宗今當説能立因頌曰所有因似因多屬於宗法故於因等義先廣顯宗法宗法於同品謂有非有俱於異品各三有非有及二此中宗法分為九種故先當觀察且此中云何名為宗法如何不成以有法已極成故非所樂成立曰此無過失總是所立故法有法單獨雖非真所立是彼一分故假説名所立總聚之義是所比量如前已説彼正所立總聚之支分義單獨之法及有法假説名宗是彼之法故無有過失如説燒衣由彼俱成法而得名言故由是立敵俱成之法而立宗法之名言故若俱或隨一相反或猶豫法成非所許此中義説若俱顛倒極成即不許為因兩俱不成如云聲是無常是眼所取故若隨一顛倒成者即隨一不成如對聲顯論者説所作性故若二俱或隨一猶豫者即猶豫不成如以懷疑煙處成立有火言法成者信慧譯為所依不成如云樂等一切處有故我周遍而有此復於宗法中不許皆能破此句是結上文兩俱不成等皆不許是宗法對此一切皆是能破也其餘若俱極成者能破或能立謂若俱極成為非宗法者如云眼所取性此即能破能立者如云由緣別而異故問其餘非能立非能破者由何了知耶餘者許重成若能成立為宗法者彼是能立若成立為非宗法者即是能破此段如理門論云唯有共許決定言詞説名能立或名能破非互不成猶豫言詞復待成故其宗法為能立者有法非能成有法及於法法亦非有法法成法成故有法亦如是且如有説以煙立火是以有法立餘有法彼説非理此中非是知火有性人皆知有火故説於此也若謂以煙所屬為所立者應成宗義一分為因若於所比煙見有火者亦不應理應無所比量故故必應説於此成立方處彼即有法此中非以德與有德之理安立法與有法如是且説非以有法成立有法次應説亦非以有法成立於法如有説以火立觸彼亦非理如前説於此故若謂此應道理於一切煙見有火故方處雖是所立然以火之差別熱觸為所立故則觀察方處無義亦非以宗義一分為因以火之差別為所立故以總為因故言火之差別為所立者應許方處所別之煙應是火字為所立此中何故瞋方處之差別而愛火之差別也有説法不成立法亦不成立有法如説最勝有一現見別物有隨轉故奘譯有總類故此中但立別物定有一因為宗謂如塊段等定有一因為喻故是立餘法為宗也何以故曰成故有法亦如是言亦如是者謂顯由餘法差別之有法亦是所立是成立因法與所立法無則不生也乙釋伏難由宗因之語應成非所樂當知是答彼由彼門合故説因宗所隨宗無因不有依第五顯喻由合故知因若説反破者應成為無因由二喻成故故非別解因應非宗法故由先有所立如是因宗門當知説過破為解釋他派立量疑難故頌曰由宗因之語應成非所樂當知是答彼由彼門合故如説聲非常業等應常故常應可得故此是答破由因宗門若有所立應成過故以先立常無形礙故後但立宗斥彼因過又彼宗法即是因性説因宗所隨宗無因不有依第五顯喻如説聲是無常所作非常故常非所作故此中非有宗法性而有喻相由合故知因此中由合顯示宗法如曰聲是所作非非所作若説反破者應成為無因由二喻成故若説反破者應成無因彼非由破而生因中若無應成異故此中若以無為先別異可得者則隨行應不可得應成不樂邪增益故由現見一隨行為先不見別異故是有一為先也有一總因為先若不許彼應無隨行即無總類彼亦非有即説隨行故非別解因按藏文意是非離相應外另是餘因關於數論派之相應因與反破因後有解釋言隨行非有應成異故此有何差別又於此中應説餘過謂最勝非有受用者與所受用應成德與有德故實應非有諸德應成實實應非實故彼等如何成為反破此非反破何以故應非宗法故由先有所立如是因宗門當知説過破此中成立最勝為有之因為成立諸德隨行故説一果為因若許此者則所見歡喜等果彼如功德隨行應成受用者故不決定若不許者非所受用者非功德故根本因不成也此文尚須研究實謂由實性相應其許為無實諸德亦應成實以有相應故是以相應破以相應之和合一故或遍一切故彼等亦應成實應許實即相應或相應亦即實即非實法如實亦應有實此是宗過實即以非實破除故若謂諸德亦與實相應故亦應成實故不決定者然不能作是説以未見實性相應之餘實性故故言即成彼性理應是宗由實相應為因其餘德等亦應成過且止應成正明因分二甲立自宗乙破異執今甲立自宗無異言即此於別法宣説言同品於品不許此有異彼餘彼相違於二種異品無因及相違唯由於簡別唯同品非有雖是同一相多義轉應理總隨轉非愚所量作無常作性聞勇發無常勇無觸依常性等九於同有及二在異無是因翻此名相違所餘皆不定樂説唯一數於相違疑故如是疑及因見決定為一諸具二相者許二二非一衆多若不違尤其於一轉若法是不共共決定相違遍一切於彼皆是疑因性觀宗法審察若所樂違害成躊躇顛倒異此無似因邪證法有法自性或差別由違害於彼此成相違因共與差別法及所立二種初二是猶豫餘觀待分三由隨行不行返隨不成故非於一隨行及返應成因成二者非有有亦無俱非隨遮其所無即成所成義彼一餘二轉若如轉成者由白色德依應逆其次第了知三二一顯示一言故反所立相違若隨所轉者於差別愚蒙即由宗法成為因與似因彼等差別謂有非有俱等此中成立有者謂由所立法總品類均等説名同品以一切義皆名品故彼所立法無異言即此於別法宣説即説同品有也如聲無常瓶等亦無常即聲無常之同品其所作性因亦貫兩無常法上由極相似無異故言即此即説瓶上因法亦即聲上之因法也所謂無異也即此也皆是極相似非是一體言同品有即無常之同類法上定有所作性因也然不説遍有因可狹於宗故或問言同品於品若言無異即此為同品者此亦應於同品有也此中未説差別曰雖有別異如瓶等上所有無常非是所立然不許此有異故言同品有極為應理若爾異品云何有説餘相屬於有法如説非福有説唯破有即無屬於非有其中且説彼餘彼相違於二種異品無因及相違唯由於簡別若同品所餘是異品有者則應無因謂同品所有之所作性等除無常外於餘苦等亦有也同品相違雖是異品應唯由簡別若無彼性而了解所立此如云此處有火暖由有火暖了知無冷觸然於無暖觸處非定無非冷觸也即無暖處非定有冷有中庸處為不定故唯同品非有雖是同一相多義轉應理謂若同品無即名異品故言異品唯無即同品非無是同品有彼即正因如所作性是成無常之因如是亦是成無我等之因謂於無我等非無即於無我等有也若謂此是總應成猶豫曰所作性雖是總然於無常及無我等非如瓶等是猶豫因總隨行非愚非一切總皆猶豫之因如瓶是所作性於非瓶上亦見彼性然所作性於無常等無處則不可見於一切處具因相故是決定因如是宗法三種差別謂同品有非有及有非有俱又此一一各有三種謂於一切同品有中於其異品或有非有及有非有俱於其同品非有及俱各有如是三種差別若無常宗全無異品對不立有虛空等論云何得説彼處此無若彼無有於彼不轉全無有疑故無此過如是合成九種宗法隨其次第略辨其相同品有異品有同品無異品有同品俱異品有同品有異品無同品無異品無同品俱異品無同品有異品俱同品無異品俱同品俱異品俱上下之中間為正因左右之中間是相違餘五是不定因如是九種依次畫為九格上下竪寫同品三種橫寫異品三種由於四方當知其自性與結果謂立聲常所量性故或立無常所作性故或立勤勇無間所發無常性故或立為常所作性故或立為常所聞性故或立為常勤勇無間所發性故或非勤勇無間所發無常性故或立無常勤勇無間所發性故或立為常無觸對故此攝頌云所量作無常作性聞勇發無常勇無觸依常性等九如是分別説名為因相違不定頌云於同有及二在異無是因此中唯有二種名正因謂於同品一切遍有異品遍無及於同品通有非有異品遍無於初後三各取中一翻此名相違復唯二種説名相違能倒立故謂於異品有及二於其同品一切遍無第二三中取初後二復有餘相違因謂能成立違害所立者如説諸別異物是積聚性能為他用積聚性故必為他用此因能成多義故即二因中攝非出九種之外也所餘皆不定所餘五種因及相違皆不決定是疑因義又於一切因等相中皆説所説一數同類樂説唯一數當知同一類故言一數者此中如同品有等樂説一數於相違疑故謂於説二種相更互相違猶見一數如於聲上由所作性與所聞性疑聲是常或是無常奘師譯為勿説二相更互相違共集一處猶為因等作為破一實數藏文似是解不説二數之理由如是疑及因見決定為一如聲由非眼所取及是現見事決定非實亦非是業故樂説為一也若謂由如是樂説為一則不應成為猶豫與決定二因耶曰無過何以故諸具二相者許二二非一此中具足猶豫與抉擇彼二種相非單一相此中何為疑相曰相違決定且於一事從無疑相具足疑相應道理故是為一性如是具足非眼所取與是現見事如説之因相非單獨相若謂一一無違為因相應理此如説所作性故無常勤勇無間所發性故無常由衆多因如何決定耶曰衆多若不違尤其於一轉此中雖是多因然同作一事故言一性全不相違如衆多人欲説一義言於此事吾等一致此説多因可共成一宗前説所作性能成無常與無我等是一因可成多宗若謂諸由二因而作多事如説所作性故無常苦故無我此如相違決定應成疑因曰無有此失彼一一因皆能作多事如前於非一事轉極為應理此説多因可成不相違多宗若謂由各異因成立多種所立者如離於支無別有支以是猶豫與抉擇故曰此是更互依待俱相隨轉同是一因或由合聚成就因相俱是能立故無過失若謂理應四種為不定因二俱有故所聞云何由不共故以若不共所成立法所有差別遍攝一切皆是疑因唯彼有性彼所攝故一向離故諸有皆共無簡別因此唯於彼俱不相違是疑因性若於其中俱分是有亦是定因簡別餘故是名差別若對許有聲性是常此應是因若於爾時無有顯示所作性等是無常因容有此義然俱可得一義相違不容有故是猶豫因又於此中現教力勝故應依此思求決定攝上頌言若法是不共共決定相違遍一切於彼皆是疑因性觀宗法審察若所樂違害成躊躇顛倒異此無似因問違害所樂之相違因云何謂相反之因何故不成不為他用若謂由有為他用之因故如是言所作性故無常則所作性應不能成立無常以有能成常性之因所聞性故者此是惡攻難以彼執一與常性因俱行因故應非能立此文尚須研究若謂如是一因由所立差別應了達二義如非眼所取性與是現見事曰如是與相違決定各異此不見有疑不應觀察謂從差別為他所用成立相返故即相違因如是為積聚他用此樂成立為非積聚他用者是餘積聚性之因其非積聚性都非現比之所成立此之有性不極成故此非疑因是法差別相違因與相違決定之差別此段文字是辨法差別相違因與相違決定因之區別前云相違因是成立相反義他難應與相違決定無異解答曰相違決定是執不同二因成立二宗其相違因是以一因成立相反二宗又説相違決定是疑因不能成立任何一宗其相違因則能決定成立相反宗義是其差別如是違害現見者由顛倒成立有法之自性差別故説為相違如説勤勇無間所發性故非聲又如説非所聞性俱是所立者謂法所差別之有法是所立宗故其中隨一或是二俱若自性若差別顛倒成立故是相違因當説二俱相違之例如説一切語言皆是虛妄是能表故如夢中能表若有如是説者其言説與所説體性皆虛妄性則謗總義是彼自性相違若彼説者自非虛妄則是差別相違頌云邪證法有法自性或差別由違害於彼此成相違因奘譯後二句為此成相違因若無所違害信慧譯本亦同此謂由此因違害彼所樂宗故名相違因又論師引伏難曰非內積聚性如是非他用謂積聚性是眼等內性相應列此為因今破其因相若如是者二者之同品不成成立相違品為一切他所用故仍攝入前相違中復為顯揚彼義故更由餘門宣説共與差別法及所立二種謂所立法之能了唯有三種一共二別三諸二分者應知九種分別亦是從彼三而分初二是猶豫謂於一切法之各別自性由共及別而一向生猶豫如立聲常或無常而云所量性故或云所聞性故餘觀待分三觀待所立俱二分者可分三種謂正因邪因疑因何故如此初二種因一向疑者謂由彼二於一切品由隨行不行返隨不成故於多品中不能簡別一亦不能成立一以彼要由隨行與返還故彼二未離一分故共者未離異品有不共者未離同品無信慧譯為各缺一相較為易解或謂若爾非於一隨行及返應成因謂俱二分者非一定隨轉應隨行與返還二俱成因曰若有可爾成二者非有有亦無俱非以於一義不容有亦常亦無常如是凡所有義亦必無有既非是常亦非無常或問如何二分於相違多義轉隨一切轉為能知因耶曰彼是由遮門非由表門取其差別隨遮其所無即成所成義彼一餘二轉謂二分中隨其所無即應遮除即由此門於所立類一切遍轉或一轉説為如實了知之因如云聲是無常所作性故及云勤勇無間所發性故如是由青蓮花之妙香能成立香性德性能依性非德性等以無香等則不見故後後寬於前前若無後者必無前者故由前者能成後者若非爾者若如轉成者由白色德依應逆其次第了知三二一説一言者若不成一則是相違決定應知即是疑因如許常總者即許聲性常者於所聞性與所作性之聲為是常耶抑無常耶成為猶豫之因若謂顯示一言故應了解為一性者曰不爾諸相違者不樂説為一故其所作性與勤勇無間所發性二者是同一因如由竪立行相與鳥棲其上二事合一即知是樹反所立相違彼於二分應二相轉由遮遣彼已為所立義於餘轉故成其相反如即由上諸因成立為常此中亦由遮常門中成其相反也若説此處有火故而有冷觸此如何成相違如何不違唯遮冷觸不成暖故曰縱不成暖然能成非冷觸如是若時由火能成非暖觸之相違品則説成暖觸即此義成非冷觸故説名相違亦不相違若謂所作性與勤勇所發及非所發俱不相異從一切不異俱無返故其無常性隨轉智應不待遮常也曰若何智於何轉即彼隨轉智之差別由分析門能作用者雖可如是然若隨所轉者於差別愚蒙如所作性於勤勇所發與非所發俱隨轉故二者於聲俱是猶豫因以若立所作性故是勤勇無間所發亦可立云所作性故非勤勇無間所發如是由勤勇無間所發性亦可立是德與非德也若謂如是云所作性故無常無我亦應成疑因二俱有故曰若離無常於無我上有所作性者容有彼過如是互返是此差別勤發與非勤發是互相排斥的而無常與無我則非互排的故不相同是故聲上其所作性於無常無我等處則見於彼無處則不見故總是決定因若互相排斥則是疑因非離破常別有無常由返一切異品即由此門所立智轉則為應理然於此中非必一切同品皆有亦不能緣一切皆有以諸正因亦不能捨自所繫屬而於餘處有因智生也當知此中是依一事而説猶如語表之聲由所作性現見自等起智故如身表業了知是勤勇所發性如是初二亦應是緣一作用者不爾彼要示餘法乃生決定非由自身能生決定也共與別法者是無簡別因故是待餘法乃能決定之因諸俱分者簡別餘己若處有疑則具餘法能於彼處成決定因如見竪立與鳥棲上乃知是垛非由一事能決定故如對聲常論者由自等起與所作性證其勤勇所發故於此中當取為一也然彼觀待所轉能生猶豫例如此聲所作性故為如瓶等是勤勇所發抑如電等非勤勇所發耶非説如虛空等以所作性已簡別虛空等常性應於無常成猶豫因諸已簡別餘事之因非由餘事於彼成已於諸非遮亦如是知若謂此非是常即説是無常若不爾者則應説瓶等自名也此中別於無遮之事非説是遮常謂非是常喻如聲常非所觸故如所説非是觀待猶豫而遮前者是待相違而遮也若時不許常住爾時待他所計破永久住謂此時雖有然前後際不住説是無常無有過失若謂如云無質礙故為常於一切種觀待所立俱分是第三種此如何是簡別之因曰此觀待何處成為疑因彼即簡別其餘於二品俱轉亦是觀待虛空等與業等為猶豫因非觀待微塵與瓶等故是於此所立簡別餘法有質礙之因謂聲由無質礙故為當言無作用抑當言有作用耶從常無常都非遮返之因此觀待所立俱分可説是正因倒因及猶豫因已説因及似因乙破異執分二子破所説因丑破所説似因初又分四破論軌破正理派破勝論派破數論派今破論軌對論軌者説若顯異品無便説為因者若異品唯無不共應成因指定唯異無唯等遍為因非許唯同有於一見多義若示彼體者述因則無能如實義未説由何相於何如超越能知不見義能立眼所取等聲應成無常因若謂未説者於何何未説俱行於所立非爾由二喻即見無常等豈許餘所立今當觀察他派所計且如論軌中説若顯異品無便説為因者若異品唯無不共應成因若説異品唯無作指定者則云所聞性故常此應成正因以於常性無之瓶等不見彼故指定唯異無唯等遍為因若謂唯異品無者則此中唯各有或是等遍者方是因此雖無所聞性應成因之過然指定唯異品無故則唯有等遍者方得成因則唯所作性乃能了解無常其勤勇所發性應非是因以彼與無常非平等遍以雖無彼猶見無常故非許唯同有若指定唯同品乃有則應成為唯同品俱行者此雖無有前二過失然則唯所立同品無則不生餘都非有於一見多義然於一因亦見衆多無則不生如一所作性是無常無我等無則不生也故三種指定詞皆有過失異品唯無唯異品無唯同品有三句唯字復當觀察許同品俱行之因為如其所顯而説其相為如實義而有耶彼有何過曰若示彼體者述因則無能此言勤勇無間所發故非能顯示所立無則不生也若如實義若謂如所有實義而説其相者如是亦未説由何相於何若由因自己顯示者則以何行相如何顯示自體都未見也如超越能知不見義能立其能知因未由自相攝持則不能了知所知之義頌文為若超出能知則非義之能立即不能立所知義也眼所取等聲應成無常因若謂由攝持彼體性即能詮彼相者則眼所取性言眼所取之聲本身是無常亦應成為無常性俱行之因也若謂所未顯示則説彼非因者若謂未説者於何何未説由何如何未説於何事而不成因都未説也前外人説所未説者即不成因今進問言所未説由何如何未説言不成因為於何事不成因均未説明也俱行於所立若謂由同品無則不生門未顯示所立者曰非爾由二喻謂由同品俱行性及同法或異法攝攬外事以二種喻便能了知如説能顯示決定關係是為譬喻所言何法由何於所立未説者今當觀察即見無常等豈許餘所立若所作性因能顯聲無常性餘有何不成為成彼故而説譬喻非更欲説餘所立宗如是所言所未説者不應道理破正理派諸正理派者説從同法説喻彼即成立所立之因此敘外計下逐計破云若同法能立非分非第五謂語應簡別於能立非理俱應得他性彼非同法因非彼二過破應時亦無他各相違害故假立亦非有故第六於彼差別亦無義非許一切語何許應簡別無許為不許超越主要聲唯異門於總非有其特殊彼似空異法相同應是因若同法能立非分非語分謂若説同法即是能立所立之因者則語支分應非是因各異轉故若許由同時説故雖是各異而不異轉如軍旅等事實宗等非不異轉非説義故復次非第五此中不得第五第五轉聲從聲若即同法之喻説成立所立者亦非彼法從彼為因亦未見能別所別等各異説故謂語若作是思與從同法説喻之語由更互輾轉之門是為成立所立之因者如是則應簡別何以故以同法喻説之語與智欲等皆從彼起故應簡別説若謂不須別説於能立非理釋中作於能立非有以説能立所立之語中不顯示智與欲等故彼等非能立所立復問為許直接親能立所立抑許間接疏立耶彼有何過俱應得他性若從親者則應唯聽者所屬之念為因若從疏者則聽聞同法之智亦應成因若謂雖更互輾轉能立所立彼即是因然聽聞之智不成因彼非同法因以彼從語起非從同法説喻故非彼二過故從同法喻説中亦有從親耶抑從疏耶二種亦俱有過失若計從親説者則彼同法智應是因以彼若親若疏皆能立所立若從疏者即聞者之智等亦應成因時所説也若謂此應時故不應説特別所立者何為彼時應時亦無他即應時宗亦從同法顯説喻者即應成因若謂容有其他非從同法顯説喻者曰縱有其他然觀待同法説喻之諸後支分亦應成因若謂無此過其説喻等後支不成為因以説各相相違害故各相違害故假立亦非有諸所得者如一有違害分別所攝亦應爾故則應成猶豫信慧譯為有分別所攝者尚應研究故第六謂故應用第六轉聲屬聲謂同法之喻説為因應成第六轉如説餘是彼法之相如是雖能斷疑然非無過何以故於彼差別亦無義縱作第六轉聲其言能立所立亦成增語若謂為簡別故説彼非一切同法語皆是因者非許一切語何許應簡別若非一切同法語皆是因者為即彼同法語非因耶不以差別義而差別若謂於聲差別非有故為了達義而成差別如宗與因成相違故者彼亦非理何以故無所為不許超越主要聲此説若無原因超出正常聲義不應道理故應簡別同法非簡別聲義也如是不作簡別則不能如實成立故應簡別若謂言能立所立彼即簡別者曰彼非簡別唯異門以一切支分皆是能立所立故應了解為所立之簡別若謂違反成立異法如是即是成立所立又不能立者是諸似因彼諸同法則非似因即説為正因者曰如是簡別亦不應理於總非有其特殊凡諸錯亂之同法異法皆是似因彼非能成為正因以於特殊境必無成總時故非先列為特殊後觀為總或於特殊境後列為總也復次彼似空異法相同應是因若由似因所空即非似因之同法異法皆是因者則説聲常所聞性故如聲性彼量之喻及同法諸似因中應皆非有彼量式中瓶等異法及成餘法如是説聲常勤勇無間所發性故如電等異法亦爾彼等同法異法諸似因中皆應非有也餘者有説即能立所立由前簡別如説從同法顯示喻説彼即成立所立之因凡與所立同法等彼即喻等如彼所説亦應為斷疑故説第六轉聲及似因所空應成正因故所説因相不應道理破勝論派諸勝論派説彼相應之法是因此敘外計破云總性應成法法有法非宗不共亦得成宗相應之法復次諸不定成立有空等量式不應立此所言彼聲顯然是與説所立相屬即應是説唯所立與彼相應此復為説總聚為説法抑説有法若説總聚者總性應成法此中如言聲是無常其總之無常法應説為因以總之餘法非有也如言以有角故是馬此中亦有角是總之法應成為因若謂是法者彼之所作性等非有無常上更無所作性等若謂是有法者亦不應理已極成故若謂無常性是所立者非爾總義是所立故或言無常性之聲或言聲無常性或言聲無常此等總義皆是簡擇之果故故唯總義乃是所立法有法非宗彼等非是所立有過失故若謂總亦非是有前所説過失故唯聲之功德乃屬所立其中總或有法無他相應之法故應許唯無常法乃是所立其次乃説唯聲與彼相應彼聲之法乃是因也曰彼之共不共因皆應成所立相應之法不共亦得成宗相應之法若指定云所立相應之唯法都無所為不疑成為有法故彼應言唯所立相應之法乃繫屬故應得為彼之法也如是則云聲常所聞性故亦應成因若謂所立法亦相同者曰不同為簡別彼故云餘二品轉謂此非向餘轉故非相同也若唯無常是所立者則除聲外餘法亦與彼相應瓶等之法亦應説為因故眼所取性亦應説為因也復次諸不定言不定者謂猶豫因諸錯亂因亦應成因如説是常無質礙故亦應了知與彼相應以一切種無繫屬故是故應説與彼同法相應不錯亂也如是與彼相應法同者是為同法則捨離餘法及所聞性言不錯亂與指定詞則捨離錯亂法之語故前者則有所説過失成立有空等量式不應立彼中非有極成宗相應法或所立相應法以有法不極成故是故量式全無系屬因定非理也破數論派諸數論者説為他顯示由相應與反破差別分二種比量其中相應語之事境有五種由宗等別故此敘外計較本論稍廣不知量境故所立法能立是廣語未説不具勝隨行語亦度非理與宗義相違無諍故非有異如樹皮等隨行皆成者有一類隨行餘亦唯一果親因亦成彼非外俱過故雖許亦相違亦應成不定喻由缺所立故彼亦非有非成由差別障礙因非二二式亦非理最後者相反遣一彼非理非如具有五由破一一敵許為後邊者敵答無邊際應皆成反破是為中間頌其相應比量與反破比量皆當聯繫所量而觀察之非一切支皆是因支以攝入相應與反破中故且如有説最勝為有現見別物有總類故藏文為有隨行故若謂此中以最勝有性為所立者非爾不知量境故非共相境則無比量前已説訖所立法能立所立之法即能立之種類無別異故若不爾者言是能燒故亦應能成聲無常也復次是廣語極廣之語理非能立之因以能立因是略説故此復未説彼復未説略説是因以説一切支皆是能立彼未説之差別非所了知也喻亦非理若能顯示成立所立者是喻彼亦非理不具勝隨行當知樹皮等非具有一總類之最勝也縱然是有未顯示者無隨行故是為似喻如是全無能立之義於所詮分失壞語能詮分若謂所詮非有過失能顯示彼即是喻者彼亦不然彼非唯所詮有過語亦語説譬喻亦有過失語不能顯樹皮等上有彼最勝及隨行故度非理量度語喻亦非正理無有合一之量謂如其喻成立所立也如是以最勝有性為所立支分之相於一切種無所聯系也理門論説當有聯繫謂立別物定有一因為宗此中先説與宗義相違若謂諸別物是一因者則樹皮等諸別異物許多因故應違其宗若不許者則喻非有亦是過失若謂以有為先是其所立非是一性謂顯是此之故無諍故以無諍故非立果有因非以果有因為所立宗如是無諍不應道理否則既非是一非有亦非唯有為所立也非是樂等之種類及隨行異如樹皮等若謂彼之總類一因是所立者彼亦不然以諸別物無一總類及隨行故若謂隨行皆成者不爾無譬喻故以無常性及果性等所隨行故諸餘相應不聯繫故其因亦有不成相違不定等諸惡過失且不成者以無一類及隨行故不爾以諸別物同一果故亦見有一類隨行餘亦唯一果即無一類隨行亦唯一果若謂於薩埵等三德見由隨行生一果者聲等不異諸果世間亦有眼等之識等故此無定不定從一類隨行生也復次親因亦成彼由是親因之果理應以彼比知彼之種類非是聲等境者曰縱非聲等然於士夫神我亦應比度三德以諸識後現見歡喜等果故若謂應説是於聲等外境現見歡喜等果者曰非外俱過故歡喜等果耳等轉時隨執異或不異俱有過失若執不異者則違害各著自境若執異者則違害比度同一總類彼非聲等外境之果以聲是由積聚假立故如於行相等假立業等又隨指定或不指定俱不如是俱有過故若謂指定由彼比度唯一總類隨行者則違害彼有種種自性若不指定者則應無別反破以俱不指定故總別一一皆成反破此等且屬不成過失雖許亦相違縱許有諸別物與隨行同一總類其因亦有相違過失以不見多前行者具足同一總類其諸樹等無一成就彼亦非樹皮等之前行以有樹等之親因故又所許因不但有相違過亦應成不定縱許樹等為樹皮等前行其因亦是不定過如是樹皮瓦片陶器莊嚴具等皆應具足樂等種類及多法前行也如是且説因三種過又由立別物先有一因為宗故喻亦缺所立不應許一切皆以最勝為先應説樹皮等以樹等為先故彼亦非有彼喻亦非有以樹皮等是別物中有故非離別物另有樹皮等及成立彼等所立有一因前行故如是餘支合結二支之相應因當知亦非理言一切之後而反破者謂各別破除他計之後而受持自宗者稱為反破按藏文應名破返或遣返即遣他計後返成自宗之義彼謂各別破除之方便有二謂譬喻相違及所許相違其中唯破他宗非成非能成立自宗不見唯破他宗便能成自宗如説非質礙故聲常唯説其是不定雖使他宗不成然非是成立自宗唯此不能成立聲是無常彼亦不定故如某河漲滿各各破除雪山融化等原因而了知是降雨原因者非唯由破除由差別是由自體差別而知此由各別破除雪融化等而以江河漲滿為差別否則唯各別破除降雨等錯誤亦應成為霹靂等原因也彼言破除他宗之方便有二此亦非理障礙因非二其障礙能破之方便非唯二種由顯示支不完具之過亦能障礙如是且説反破之相不應道理二式亦非理其中且説隨行反破即用反破成立隨行如云若從無而生無生處故應成別異此是説諸以生處未先行者即應不異可得也一類隨行不可得者亦應增益為相反性其中且如生處先行而不異者都非所許應是無生處為先而各異者都非所許諸生處為先唯由説一類隨行應是唯由未説一類隨行應成顛倒亦不應理由未説異亦非即應一類隨行若謂無過無生處故即説應一性如其所説未説其理以諸別物一類隨行非有故所説難皆無所成若謂是遮一向決定一性者不爾彼亦未説應得其返生處未先行者未見一性一向決定故應得成總別性因共得不共因種種隨行與反破等亦應無別其中非有一向決定故非應説異故僅未説因非成相反反其所立則為應理謂諸不異法有一為先一向決定故彼相反者則應成異如是云最後者相反如是比度諸同類法有一為先謂由最後以無為先等即應成異非由最後比度以一為先彼亦應成異此説諸別物有一類隨行故諸別物定有一總類此與相應因是其別異信慧譯為非有差異量式應云若別性非從一生無生處故應成別異義謂應無一類者謂諸一類相屬者現見以一為先非以無為先亦非以自在等為先也説由最後反破者亦遣一彼非理如是量式不應道理破從無生最後謂從最勝生亦非道理復次非如具有五謂説反破亦有五種如是則與最後相無有聯繫謂破一切他宗最後一性説為反破由破一一敵許為後邊者敵答無邊性應皆成反破是為中間頌故説量式相全無繫屬也此等非僅説數論之因不應道理亦説相應與反破不應理也已説因相當説似因丑破所説似因分三破論軌破正理派破勝論派今破論軌論軌中説不成不定相違之義名為似因其中僅説不成等例喻未説其相如云眼所取故無常是不成因無質礙故常是不定因勝論派説從根生故信慧譯為根所取故無常是一相違數論派説因中有果有乃生故是第二相違此是敘計下破執云由於論軌中未説不成別亦未説錯亂彼亦屬不共亦相違決定一相違總同一不成不共未説相反由及違害所樂其中未説不成別者謂隨一不成等有多種差別皆未宣説亦未説錯亂亦未説其差別共不定等彼亦有不共亦相違決定當如吾等所説有六種不定一相違總同勝論派説總同與從根生是常於常無常俱可見故此是不定非相違因總同即共不定一不成不共謂第二相違是不成與不共因何以故謂先已生而更生者則非是有此是成立一切果法於先已生中有非從先已生中生也縱然許彼亦唯彼有是不共因此非相違以不成立相反義故未説相反由及違害所樂故是缺少彼等之中所不能攝亦不能説非是似因以是相反及能害之因故破正理派諸正理者説有錯亂者即是不定非有差別説違宗所許是為相違餘相違非他説為抉擇應時義故所列舉者名時相同此應成不定説能立與所立無差別故名同所立此非不成説延時而説名過時者此是不完全成立所立故正理派者説有錯亂相違與時相同所立相同超過時等是名似因此敘外計次破云所謂有錯亂者即是不定如是非有差別為從何不定或簡別他或應時者非有如説聲之總別所有是二者之德若謂此總非聲是障一定故若彼應是所立種類彼亦是障此一定也曰如是亦無差別當知如是亦於若無所立若彼所餘若彼相違而轉以義了知非一切種皆是錯亂如前已説若謂由違自宗所許名相違者如勝論派説無質礙故非是能造如諸極微如是觀察違其所宗而説者是能立之過失餘相違謂亦獲餘相違過非唯似因此中云非質礙故其不成義是因過失云非是能造亦是宗過違先許故若謂若彼俱犯不成與相違者則與宗過相違以量式中頓犯二過相違彼復誹謗餘之作者曰雖然如是若如作者量式復以餘法相違而顯示者彼亦應説即不成性其宗過失亦非他其中捨置自宗不成義無餘一違宗過失可説也説作者為他法自在與他自在等餘者之量式無所相違如説射箭與此所射此中數論者作如是説最勝非因非有思故其中遣除謂非離最勝有他故是為不共即不定因若謂説離別物是他者可成相違然非他謂彼唯是能立之相違以成立相反故非是自宗相違説為抉擇應時義故而列之因名時相同如説我是常不異身故應是異於身故如信慧本此中非由不異身故異於身觀察其我此應成不定何以故謂常如虛空等或無常如瓶等以於二者俱見不異身異於身故為此是常抑是無常而觀察之故此非異不定也説能立與所立無差別故名同所立如説聲常非所觸故如覺此中聲上非所觸因極成故此非不成此非於彼為不成因由何説與所立無差別而名同所立然此中譬喻與所立相同可作餘觀察謂喻與所立無差別之因名與所立無差別作是觀察是同所依事多谷者非一切皆能得也縱是所許因亦不成此非與所立無差別之喻然是語總此上數句似有錯誤是故非唯不成亦是似因應是非是不成似因如何為不成若法説為因而於有法不成或立敵隨一不成或猶豫不成説延時而説名過時者如説聲是無常如瓶問曰未説其因乃説所作性故此是不完全説或為決定而後時説俱不説為似因何以故不完全成立所立故且若是不完全説者由缺少故是不完全缺少因支以非有故非是似因若為決定後時説者如是因相應理能成所立非是似因如因處而有彼非似因之相故此非是似因也破勝論派諸勝論派説似因有三種謂不成未顯示懷疑非有之因此敘外計次破云若如勝論者無有或相違相反説不全所説不成且非似因謂或於喻無或不極成義言為因義故其或字是觀察之聲如是則於喻已極成也若謂是説所立不成者如是則言為因義應成相違言應顯示極成為先者此中當説於繫屬時已善極成非有者謂無則非疑惑有角是已成故既極成已於彼説喻如云若是有角則是馬或牛也若謂非有之因即是非有二意之因即成疑者曰且非非有之因唯非有者不能了知如是唯非有無能了知然是相反其中由於有角非馬智生而非彼智由成立相反故是相違性有疑惑之因當説為疑説不全如説是有角故是牛非唯彼等便是疑因然是不共如説六句義是耳所取性彼於一切中無於衆多境是猶豫因若謂於二別法俱見故彼即是總如竪立者彼不應理由無所反彼如是現由是有一實故雖無疑惑然於地等則是猶豫從彼一切皆返非有故故不説餘一切疑因皆是不共也此等義尚須研究如是當説衆多相違與不定因如説為由地等合集而造身為由各自種類便成疑惑以五因可得故及破由異類造故當説疑經不全也此復總由現見由塢波羅白色定見德性能依性無德性等非是疑惑故諸非決斷之因不應説彼總於現見中是猶豫因彼唯缺少若謂非有之因是無猶豫之因是疑者何所立無及猶豫皆未説故如是是説少也如有立聲無常未説是眼所取當於境猶豫如以煙等成立火等如是勝論派之似因難以成立已説因及似因
